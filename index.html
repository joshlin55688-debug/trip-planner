/* 手動修正過的活動座標（a.lat/a.lon）優先，覆蓋定位結果 */
function seedActCoords(acts) {
  acts.forEach(a => { if (a.lat != null && a.lon != null && a.loc) geoCache[a.loc] = { lat: a.lat, lon: a.lon }; });
}

async function initDayMap(trip, di) {
  const box = document.getElementById('mapBox');
  if (!box) return;
  if (typeof L === 'undefined') { box.innerHTML = '<div class="map-loading">⚠️ 地圖元件未載入，請確認網路連線後重新整理</div>'; return; }

  const acts = trip.days[di].acts.filter(a => a.loc);
  const pool = trip.pool || [];
  // 手動修正過的活動座標 & 候選地點座標先餵進快取（覆蓋定位結果）
  seedActCoords(acts);
  pool.forEach(p => { if (p.lat != null && p.loc && geoCache[p.loc] === undefined) geoCache[p.loc] = { lat: p.lat, lon: p.lon }; });
  saveGeo();

  const needGeo = acts.filter(a => geoCache[a.loc] === undefined).length + pool.filter(p => geoCache[p.loc] === undefined).length;
  if (needGeo) box.innerHTML = '<div class="map-loading">🛰️ 定位地點中…（第一次較慢）</div>';

  for (const a of acts) { if (geoCache[a.loc] === undefined) await geocodeSlow(a.loc); }
  for (const p of pool) { if (geoCache[p.loc] === undefined) await geocodeSlow(p.loc); }
  // 期間使用者可能已切換畫面
  if (view.tripId !== trip.id || view.dayIndex !== di || !view.showMap) return;
  if (!document.getElementById('mapBox')) return;

  destroyMap();
  box.innerHTML = '';
  leafMap = L.map(box, { scrollWheelZoom: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(leafMap);

  const bounds = [];       // 自動縮放只看當天活動，候選點不算（避免被定位到遠方的候選拉到全世界）
  const poolBounds = [];
  // 候選地點（灰點）
  pool.forEach(p => {
    const c = geoCache[p.loc];
    if (!c) return;
    L.marker([c.lat, c.lon], { icon: poolIcon() }).addTo(leafMap).bindPopup('📍 候選地點<br><b>' + esc(p.name) + '</b>', { autoPanPadding: [30, 60], keepInView: true });
    poolBounds.push([c.lat, c.lon]);
  });
  // 當天有「地點」的活動：有座標的照位置放；查不到座標的放到地圖中央，讓你拖曳定位
  const located = acts.filter(a => a.loc);
  const placed = [], unplaced = [];
  located.forEach((a, idx) => {
    const c = (a.lat != null && a.lon != null) ? { lat: a.lat, lon: a.lon } : geoCache[a.loc];
    if (c) { placed.push({ a, c, idx }); bounds.push([c.lat, c.lon]); }
    else unplaced.push({ a, idx });
  });

  // 先決定視野（用有座標的活動；都沒有就退候選點，再不然預設香港）
  const fit = bounds.length ? bounds : poolBounds;
  if (fit.length === 1) leafMap.setView(fit[0], 13);
  else if (fit.length) leafMap.fitBounds(fit, { padding: [34, 34], maxZoom: 15 });
  else leafMap.setView([22.30, 114.17], 11);
  box.querySelector('.map-loading') && box.querySelector('.map-loading').remove();

  const actMarkers = [];   // { marker, a, idx }
  let dayLine = null, roadLine = null, roadReqId = 0;
  const orderedCoords = () => actMarkers
    .filter(am => am.a.lat != null || geoCache[am.a.loc])
    .sort((p, q) => p.idx - q.idx)
    .map(am => am.marker.getLatLng());
  async function drawRoadRoute() {
    const lls = orderedCoords();
    if (lls.length < 2) { if (roadLine) { leafMap.removeLayer(roadLine); roadLine = null; } return; }
    const myReq = ++roadReqId;
    try {
      const coords = lls.map(ll => ll.lng + ',' + ll.lat).join(';');
      const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
      const j = await r.json();
      if (myReq !== roadReqId || !leafMap) return;
      if (j.code === 'Ok' && j.routes && j.routes[0]) {
        const latlngs = j.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        if (roadLine) roadLine.setLatLngs(latlngs);
        else roadLine = L.polyline(latlngs, { color: CAT_HEX.sight, weight: 4, opacity: .85 }).addTo(leafMap);
        if (dayLine) dayLine.setStyle({ opacity: .2 });   // 真實路徑出現後，直線淡化成輔助
      }
    } catch (e) { /* OSRM 失敗就保留直線 */ }
  }
  const redrawLine = () => {
    const pts = orderedCoords();
    if (pts.length > 1) {
      if (dayLine) dayLine.setLatLngs(pts);
      else dayLine = L.polyline(pts, { color: CAT_HEX.sight, weight: 3, opacity: .55, dashArray: '6,7' }).addTo(leafMap);
    } else if (dayLine) dayLine.setLatLngs([]);
    drawRoadRoute();
  };
  const setActLoc = (a, lat, lon) => {
    a.lat = +lat.toFixed(6); a.lon = +lon.toFixed(6);
    let alsoFixed = 0;
    if (a.loc) {
      geoCache[a.loc] = { lat: a.lat, lon: a.lon }; saveGeo();
      // 同地點的其他活動（例如早晚都用同一間飯店）一起定位，並移動其圖釘
      trip.days.forEach(d => d.acts.forEach(s => {
        if (s !== a && s.loc === a.loc) { s.lat = a.lat; s.lon = a.lon; delete s.travel; rAct(trip, s); alsoFixed++; }
      }));
      actMarkers.forEach(am => { if (am.a.loc === a.loc) am.marker.setLatLng([a.lat, a.lon]); });
    }
    delete a.travel;
    save(); rAct(trip, a);
    redrawLine();
    toast(`已更新「${a.title}」的位置${alsoFixed ? `（同地點 ${alsoFixed} 處一起更新）` : ''}`);
  };
  const onActDragEnd = (m, a) => setActLoc(a, m.getLatLng().lat, m.getLatLng().lng);

  // 手機友善：點圖釘選「點地圖設定位置」後，下一次點地圖就把該活動移過去（免拖曳）
  let placingActId = null;
  window.__armPlace = id => {
    placingActId = id;
    if (leafMap) leafMap.closePopup();
    toast('👆 請點一下地圖上正確的位置');
  };
  leafMap.on('click', e => {
    if (!placingActId) return;
    const am = actMarkers.find(x => x.a.id === placingActId);
    placingActId = null;
    if (am) setActLoc(am.a, e.latlng.lat, e.latlng.lng);
  });
  const placeBtn = a => a.flightKey ? '' : `<br><button class="map-place-btn" onclick="window.__armPlace('${a.id}')">📍 點地圖設定位置</button>`;

  // 有座標的活動
  placed.forEach(({ a, c, idx }) => {
    const color = CAT_HEX[a.cat] || CAT_HEX.other;
    const m = L.marker([c.lat, c.lon], { icon: numIcon(idx + 1, color), draggable: !a.flightKey }).addTo(leafMap);
    m.bindPopup(`<b>${idx + 1}. ${esc(a.title)}</b>${a.time ? '<br>🕐 ' + a.time : ''}${a.loc ? '<br>📍 ' + esc(a.loc) : ''}${a.flightKey ? '' : '<br><span style="color:#6b7384;font-size:11.5px">位置不對？拖曳圖釘，或：</span>' + placeBtn(a)}`,
      { autoPanPadding: [30, 60], keepInView: true });
    if (!a.flightKey) m.on('dragend', () => onActDragEnd(m, a));
    actMarkers.push({ marker: m, a, idx });
  });

  // 查不到座標的活動：放到地圖中央附近（橘色醒目），請你拖到正確位置
  const ctr = leafMap.getCenter();
  unplaced.forEach(({ a, idx }, k) => {
    const pos = [ctr.lat + 0.006 * (k + 1), ctr.lng + 0.006 * (k + 1)];
    const m = L.marker(pos, { icon: placeIcon(idx + 1), draggable: true, zIndexOffset: 1000 }).addTo(leafMap);
    m.bindPopup(`<b>${idx + 1}. ${esc(a.title)}</b><br><span style="color:#e8843c;font-size:12px">⚠️ 自動定位找不到「${esc(a.loc)}」</span>${placeBtn(a)}`,
      { autoPanPadding: [30, 60], keepInView: true });
    m.on('dragend', () => onActDragEnd(m, a));
    actMarkers.push({ marker: m, a, idx });
  });

  redrawLine();

  if (!placed.length && !unplaced.length && !poolBounds.length) {
    const note = document.createElement('div');
    note.className = 'map-loading'; note.style.position = 'absolute'; note.style.inset = '0'; note.style.zIndex = 500;
    note.style.background = 'rgba(238,242,247,.85)'; note.textContent = '這天還沒有可定位的地點，加上有「地點」的活動或匯入候選地點吧';
    box.appendChild(note);
  }
  setTimeout(() => { if (leafMap) leafMap.invalidateSize(); }, 120);
}

/* 行程表總覽：每天一張地圖 */
let ovMaps = [];
function destroyOvMaps() { ovMaps.forEach(m => { try { m.remove(); } catch (e) {} }); ovMaps = []; }
async function initOverviewMaps(trip) {
  if (typeof L === 'undefined') return;
  destroyOvMaps();
  const n = tripDays(trip);
  for (let di = 0; di < n; di++) {
    if (view.page !== 'overview' || view.tripId !== trip.id) return;
    const acts = trip.days[di].acts.filter(a => a.loc);
    if (!acts.length) continue;
    seedActCoords(acts);
    for (const a of acts) { if (geoCache[a.loc] === undefined) await geocodeSlow(a.loc); }
    if (view.page !== 'overview' || view.tripId !== trip.id) return;
    const box = document.getElementById('ovmap-' + di);
    if (!box) continue;
    const located = acts.map(a => ({ a, c: geoCache[a.loc] })).filter(x => x.c);
    if (!located.length) { box.querySelector('.map-loading').textContent = '（這天的地點查不到座標）'; continue; }
    box.innerHTML = '';
    const map = L.map(box, { scrollWheelZoom: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);
    const line = [], bounds = [];
    located.forEach((x, i) => {
      const color = CAT_HEX[x.a.cat] || CAT_HEX.other;
      L.marker([x.c.lat, x.c.lon], { icon: numIcon(i + 1, color) }).addTo(map)
        .bindPopup(`<b>${i + 1}. ${esc(x.a.title)}</b>${x.a.time ? '<br>🕐 ' + x.a.time : ''}`, { autoPanPadding: [25, 50], keepInView: true });
      line.push([x.c.lat, x.c.lon]); bounds.push([x.c.lat, x.c.lon]);
    });
    if (line.length > 1) L.polyline(line, { color: CAT_HEX.sight, weight: 3, opacity: .75, dashArray: '6,7' }).addTo(map);
    map.fitBounds(bounds, { padding: [26, 26], maxZoom: 15 });
    ovMaps.push(map);
    setTimeout(() => map.invalidateSize(), 150);
  }
}

/* ===================== 加入共編（貼邀請連結） ===================== */
function openJoinModal() {
  showModal(`
    <h3>🔗 加入別人的共編</h3>
    <p style="font-size:13px;color:var(--ink-soft);margin:-6px 0 12px">把同伴傳給你的「邀請連結」整段貼進來即可加入（連結裡已含設定，不用另外設定 Firebase）。</p>
    <textarea id="joinInput" class="share-link" rows="3" placeholder="貼上邀請連結，例如 https://...?room=...&cfg=..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="joinByLink()">加入</button>
    </div>
  `);
  document.getElementById('joinInput').focus();
}
function joinByLink() {
  const raw = document.getElementById('joinInput').value.trim();
  if (!raw) return toast('請貼上邀請連結');
  let room = null, cfgStr = null;
  try {
    const u = new URL(raw);
    room = u.searchParams.get('room'); cfgStr = u.searchParams.get('cfg');
  } catch (e) {
    const mR = raw.match(/[?&]room=([^&\s]+)/), mC = raw.match(/[?&]cfg=([^&\s]+)/);
    room = mR ? decodeURIComponent(mR[1]) : null; cfgStr = mC ? mC[1] : null;
  }
  if (cfgStr) { try { if (!initFirebase(b64decode(cfgStr))) return; } catch (e) { return toast('連結裡的設定看不懂，請確認複製完整'); } }
  if (!db) return toast('需要「含設定」的完整邀請連結才能加入');
  if (!room) return toast('連結缺少房號');
  ensureName();
  let trip = state.trips.find(t => t.roomId === room);
  const today = new Date().toISOString().slice(0, 10);
  if (!trip) {
    trip = { id: uid(), roomId: room, name: '共享行程', start: today, end: today, budget: 0, currency: 'NT$', rate: 0, days: [] };
    syncDays(trip); state.trips.push(trip);
  }
  subscribeRoom(trip);
  view = { page: 'trip', tripId: trip.id, dayIndex: 0 };
  closeModal(); render(); toast('已加入共編，載入中…');
}

/* ===================== 候選地點側欄（Google Maps 匯入 → 拖曳進行程） ===================== */
function renderTray(trip) {
  const pool = trip.pool || [];
  let html = `
    <aside class="tray">
      <h3>📍 候選地點 <span class="tray-badge">${pool.length}</span></h3>
      <div class="hint">從 Google 地圖匯入想去的點，<b>拖曳</b>或按「＋加入」放進某天行程。</div>
      <div class="tray-actions">
        <button class="btn small" onclick="openAddPlaceModal('${trip.id}')">＋ 加地點</button>
        <button class="btn small" onclick="triggerMapImport('${trip.id}')">📥 匯入地圖</button>
      </div>`;
  if (!pool.length) {
    html += `<div class="tray-empty">還沒有候選地點。<br>按「＋ 加地點」貼上地名或 Google 地圖連結，<br>或「📥 匯入地圖」上傳 Google Takeout / 我的地圖檔案。</div>`;
  } else {
    html += '<div class="tray-list">';
    pool.forEach(p => {
      html += `
        <div class="tray-card" draggable="true" data-pool="${p.id}">
          <button class="tc-del" title="移除" onclick="poolDelete('${trip.id}','${p.id}')">✕</button>
          <div class="tc-name">${esc(p.name)}</div>
          ${p.loc && p.loc !== p.name ? `<div class="tc-sub">📍 ${esc(p.loc)}</div>` : (p.lat != null ? `<div class="tc-sub">📍 ${p.lat.toFixed(4)}, ${p.lon.toFixed(4)}</div>` : '')}
          <div class="tc-row">
            <button class="btn" onclick="addActFromPool(${view.dayIndex},'${p.id}')">＋ 加到第 ${view.dayIndex + 1} 天</button>
          </div>
        </div>`;
    });
    html += '</div>';
    html += `<div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn small" onclick="cleanFarPool('${trip.id}')" title="刪掉離行程地點太遠的候選（如定位錯到外地的）">🧹 清掉遠方的</button>
      <button class="btn small danger-text" onclick="poolClear('${trip.id}')">清空候選</button></div>`;
  }
  html += '</aside>';
  return html;
}

function bindTray(trip) {
  let dragPoolId = null;
  app.querySelectorAll('.tray-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragPoolId = card.dataset.pool;
      e.dataTransfer.setData('text/pool', dragPoolId);
      e.dataTransfer.effectAllowed = 'copy';
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragPoolId = null; });
  });
  // 放到某一天的分頁，或放到當天面板
  const onOver = el => e => { if (dragPoolId || (e.dataTransfer && [...e.dataTransfer.types].includes('text/pool'))) { e.preventDefault(); el.classList.add('drop-active'); } };
  const onLeave = el => () => el.classList.remove('drop-active');
  app.querySelectorAll('.day-tab[data-daytab]').forEach(tab => {
    tab.addEventListener('dragover', onOver(tab));
    tab.addEventListener('dragleave', onLeave(tab));
    tab.addEventListener('drop', e => {
      const id = e.dataTransfer.getData('text/pool'); tab.classList.remove('drop-active');
      if (id) { e.preventDefault(); addActFromPool(Number(tab.dataset.daytab), id); }
    });
  });
  const panel = app.querySelector('.day-panel');
  if (panel) {
    panel.addEventListener('dragover', onOver(panel));
    panel.addEventListener('dragleave', e => { if (!panel.contains(e.relatedTarget)) panel.classList.remove('drop-active'); });
    panel.addEventListener('drop', e => {
      const id = e.dataTransfer.getData('text/pool'); panel.classList.remove('drop-active');
      if (id) { e.preventDefault(); addActFromPool(view.dayIndex, id); }
    });
  }
}

function poolAdd(trip, item) {
  if (!trip.pool) trip.pool = [];
  trip.pool.push({ id: uid(), name: item.name, loc: item.loc || item.name,
    lat: item.lat != null ? item.lat : null, lon: item.lon != null ? item.lon : null });
}
function poolDelete(tripId, id) {
  const trip = getTrip(tripId);
  trip.pool = (trip.pool || []).filter(p => p.id !== id);
  save(); render();
}
function poolClear(tripId) {
  if (!confirm('清空所有候選地點？（不影響已加進行程的活動）')) return;
  const trip = getTrip(tripId);
  trip.pool = [];
  save(); render();
}

/* 刪掉離行程地點太遠的候選（例如定位錯到外地的）。以行程裡的活動位置當基準。 */
let cleaningPool = false;
async function cleanFarPool(tripId) {
  if (cleaningPool) return toast('處理中，請稍候…');
  const trip = getTrip(tripId);
  const pool = trip.pool || [];
  if (!pool.length) return toast('沒有候選地點');

  // 參考中心：所有有座標的活動
  const actC = [];
  trip.days.forEach(d => d.acts.forEach(a => {
    if (a.flightKey) return;
    const c = (a.lat != null && a.lon != null) ? { lat: a.lat, lon: a.lon } : geoCache[a.loc];
    if (c) actC.push(c);
  }));
  if (!actC.length) return toast('行程裡還沒有「有地點」的活動可當基準。先在某天加幾個香港的活動再試。');
  const center = { lat: actC.reduce((s, c) => s + c.lat, 0) / actC.length, lon: actC.reduce((s, c) => s + c.lon, 0) / actC.length };
  const FAR_KM = 200;  // 超過 200 公里視為「遠方」（香港很小，足以區分外地）

  cleaningPool = true;
  toast('🧹 正在檢查候選地點位置…');
  try {
    const keep = [], removed = [], unknown = [];
    for (const p of pool) {
      let c = (p.lat != null && p.lon != null) ? { lat: p.lat, lon: p.lon } : geoCache[p.loc];
      if (c === undefined) { await geocodeSlow(p.loc); c = geoCache[p.loc]; }
      if (!c) { unknown.push(p); keep.push(p); continue; }   // 查不到位置的先保留
      if (haversineKm(center, c) > FAR_KM) removed.push(p); else keep.push(p);
    }
    if (!removed.length) { cleaningPool = false; return toast('沒有離行程太遠的候選' + (unknown.length ? `（${unknown.length} 個查不到位置，已保留）` : '')); }
    if (!confirm(`找到 ${removed.length} 個離行程很遠的候選（例：${removed.slice(0, 3).map(p => p.name).join('、')}${removed.length > 3 ? '…' : ''}），要刪掉嗎？\n會保留 ${keep.length} 個。`)) { cleaningPool = false; return; }
    trip.pool = keep;
    save(); render();
    toast(`已刪掉 ${removed.length} 個遠方候選${unknown.length ? `（${unknown.length} 個查不到位置，保留）` : ''}`);
  } catch (e) {
    toast('⚠️ 檢查失敗，請確認網路後再試');
  } finally {
    cleaningPool = false;
  }
}

function addActFromPool(di, poolId) {
  const trip = getTrip(view.tripId);
  const item = (trip.pool || []).find(p => p.id === poolId);
  if (!item) return;
  if (item.lat != null && item.lon != null && item.loc) { geoCache[item.loc] = { lat: item.lat, lon: item.lon }; saveGeo(); }
  const act = { id: uid(), di, order: Date.now(), by: myName, title: item.name, cat: 'sight',
    time: '', cost: 0, loc: item.loc || item.name, note: '' };
  trip.days[di].acts.push(act);
  sortDay(trip.days[di]);
  save(); render();
  rAct(trip, act);
  toast(`已把「${item.name}」加到第 ${di + 1} 天`);
}

/* ---- 新增候選：貼地名或 Google 地圖連結（每行一個） ---- */
function openAddPlaceModal(tripId) {
  showModal(`
    <h3>＋ 加候選地點</h3>
    <p style="font-size:12.5px;color:var(--ink-soft);margin:-6px 0 10px">每行一個，可以是<b>地名</b>（淺草寺 東京）或<b>Google 地圖連結</b>。連結會自動抓出名稱與座標。</p>
    <div class="field">
      <textarea id="placeInput" class="share-link" rows="6" placeholder="淺草寺 東京&#10;https://www.google.com/maps/place/...&#10;晴空塔"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="addPlacesFromText('${tripId}')">加入候選</button>
    </div>
  `);
  document.getElementById('placeInput').focus();
}
function addPlacesFromText(tripId) {
  const trip = getTrip(tripId);
  const lines = document.getElementById('placeInput').value.split('\n').map(s => s.trim()).filter(Boolean);
  if (!lines.length) return toast('請至少輸入一個地點');
  let added = 0, skipped = 0;
  for (const line of lines) {
    const item = parsePlaceLine(line);
    if (item) { poolAdd(trip, item); added++; } else skipped++;
  }
  save(); closeModal(); render();
  toast(`已加入 ${added} 個候選地點${skipped ? `（${skipped} 個短網址無法解析，請貼完整連結或地名）` : ''}`);
}

/* 解析一行：Google 地圖連結 → {name, loc, lat, lon}；否則當地名 */
function parsePlaceLine(line) {
  if (/maps\.app\.goo\.gl|goo\.gl\/maps/i.test(line)) return null; // 短網址無法離線解析
  if (/google\.[^/]+\/maps|\/maps\/place/i.test(line)) {
    let name = '', lat = null, lon = null;
    const mName = line.match(/\/place\/([^/@]+)/);
    if (mName) name = decodeURIComponent(mName[1].replace(/\+/g, ' ')).trim();
    let mC = line.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);     // place 詳細座標
    if (!mC) mC = line.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);    // @lat,lng
    if (!mC) mC = line.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/); // q=lat,lng
    if (mC) { lat = +mC[1]; lon = +mC[2]; }
    if (!name && lat != null) name = `地點 ${lat.toFixed(3)},${lon.toFixed(3)}`;
    if (!name) return null;
    return { name, loc: name, lat, lon };
  }
  return { name: line, loc: line };
}

/* ---- 匯入地圖檔：Google Takeout(GeoJSON) / 我的地圖(KML) / CSV ---- */
function triggerMapImport(tripId) {
  let inp = document.getElementById('mapFileInput');
  if (!inp) {
    inp = document.createElement('input');
    inp.type = 'file'; inp.id = 'mapFileInput'; inp.accept = '.json,.geojson,.kml,.csv,.txt'; inp.hidden = true;
    document.body.appendChild(inp);
  }
  inp.value = '';
  inp.onchange = e => { const f = e.target.files[0]; if (f) handleMapFile(tripId, f); };
  inp.click();
}
function handleMapFile(tripId, file) {
  const reader = new FileReader();
  reader.onload = () => {
    const trip = getTrip(tripId);
    const text = reader.result;
    let items = [];
    try {
      const name = file.name.toLowerCase();
      if (name.endsWith('.kml') || /<kml[\s>]/i.test(text)) items = parseKML(text);
      else if (name.endsWith('.csv') || name.endsWith('.txt')) items = parsePlacesCSV(text);
      else items = parseGeoJSON(text); // .json / .geojson
    } catch (e) { return toast('檔案讀取失敗：' + e.message); }
    if (!items.length) return toast('這個檔案裡找不到地點');
    items.forEach(it => poolAdd(trip, it));
    save(); render();
    toast(`已從檔案匯入 ${items.length} 個地點`);
  };
  reader.readAsText(file);
}
function parseGeoJSON(text) {
  const data = JSON.parse(text);
  const feats = data.features || (Array.isArray(data) ? data : []);
  const out = [];
  for (const f of feats) {
    const p = f.properties || {};
    const name = p.Title || p.name || (p.location && (p.location.name || p.location.Name)) || p['Business Name'] || '';
    let lat = null, lon = null;
    if (f.geometry && f.geometry.type === 'Point' && Array.isArray(f.geometry.coordinates)) {
      lon = +f.geometry.coordinates[0]; lat = +f.geometry.coordinates[1];
    }
    const addr = (p.location && (p.location.Address || p.location.address)) || p.Address || '';
    if (name || lat != null) out.push({ name: name || `地點 ${lat},${lon}`, loc: name || addr || `${lat},${lon}`, lat, lon });
  }
  return out;
}
function parseKML(text) {
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  const out = [];
  doc.querySelectorAll('Placemark').forEach(pm => {
    const name = (pm.querySelector('name') ? pm.querySelector('name').textContent : '').trim();
    const coordEl = pm.querySelector('Point > coordinates') || pm.querySelector('coordinates');
    let lat = null, lon = null;
    if (coordEl) { const c = coordEl.textContent.trim().split(','); lon = +c[0]; lat = +c[1]; }
    if (name || lat != null) out.push({ name: name || `地點 ${lat},${lon}`, loc: name || `${lat},${lon}`, lat, lon });
  });
  return out;
}
function parsePlacesCSV(text) {
  const out = [];
  text.split(/\r?\n/).forEach((line, i) => {
    line = line.trim(); if (!line) return;
    // 跳過明顯的表頭
    if (i === 0 && /title|name|地點|名稱/i.test(line) && !/\d/.test(line)) return;
    // 若整行是 Google 連結
    const g = parsePlaceLine(line);
    const cols = line.split(',').map(s => s.trim());
    const urlInRow = cols.find(c => /\/maps\/place|google\.[^/]+\/maps/i.test(c));
    if (urlInRow) { const it = parsePlaceLine(urlInRow); if (it) { it.name = cols[0] && !/http/i.test(cols[0]) ? cols[0] : it.name; out.push(it); return; } }
    if (cols.length >= 3 && !isNaN(+cols[1]) && !isNaN(+cols[2])) { out.push({ name: cols[0], loc: cols[0], lat: +cols[1], lon: +cols[2] }); return; }
    if (g && g.name) out.push({ name: cols[0] || g.name, loc: cols[0] || g.name });
  });
  return out;
}

/* ===================== 航班 ===================== */
function parseDT(date, time) {
  if (!date || !time) return null;
  const d = new Date(date + 'T' + time);
  return isNaN(d.getTime()) ? null : d;
}
function addMins(d, m) { return new Date(d.getTime() + m * 60000); }
function fmtHM(d) { return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`; }
function fmtMD(d) { return `${d.getMonth() + 1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）`; }
function durLabel(mins) {
  if (mins == null || mins < 0) return '';
  const h = Math.floor(mins / 60), m = mins % 60;
  return `${h > 0 ? h + ' 小時 ' : ''}${m} 分`;
}
/* 飛行時間：依填寫的當地時間計算（跨時區僅供參考） */
function flightDurMins(f) {
  const dep = parseDT(f.depDate, f.depTime), arr = parseDT(f.arrDate, f.arrTime);
  if (!dep || !arr) return null;
  const m = Math.round((arr - dep) / 60000);
  return m > 0 ? m : null;
}
/* 建議出門時刻 = 起飛 −（報到安檢預留 ＋ 到機場通勤） */
function leaveTime(f) {
  const dep = parseDT(f.depDate, f.depTime);
  if (!dep) return null;
  const lead = (Number(f.checkin) || 0) + (Number(f.commute) || 0);
  return addMins(dep, -lead);
}
function hasFlight(f) { return f && (f.depTime || f.arrTime || f.airline || f.depAirport); }

/* 把航班自動同步成行程裡的交通活動（去/回各一筆，掛 flightKey 以便更新不重複） */
function dayDateISO(trip, i) {
  const d = dayDate(trip, i);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function findDayIndexByDate(trip, dateStr) {
  if (!dateStr) return -1;
  for (let i = 0; i < tripDays(trip); i++) if (dayDateISO(trip, i) === dateStr) return i;
  return -1;
}
function syncFlightActs(trip) {
  syncDays(trip);
  // 先移除舊的航班活動（含遠端）；連被誤編輯而失去 flightKey 的殘留（標題仍是「✈️ 搭機」）一併清掉
  trip.days.forEach(d => {
    const keep = [];
    d.acts.forEach(a => { if (a.flightKey || /^✈️ 搭機 /.test(a.title || '')) rDelAct(trip, a.id); else keep.push(a); });
    d.acts = keep;
  });
  const f = trip.flights || {};
  ['out', 'back'].forEach(key => {
    const fl = f[key];
    if (!hasFlight(fl) || !fl.depTime) return;  // 至少要有起飛時間才放得進時間軸
    let di = findDayIndexByDate(trip, fl.depDate);
    if (di < 0) di = key === 'out' ? 0 : tripDays(trip) - 1;
    const note = [];
    if (fl.arrTime) note.push(`🛬 ${fl.arrTime} 抵達${fl.arrAirport ? ' ' + fl.arrAirport : ''}`);
    const lead = (Number(fl.checkin) || 0) + (Number(fl.commute) || 0);
    const lv = leaveTime(fl);
    if (lead > 0 && lv) note.push(`🏠 建議 ${key === 'out' ? fmtMD(lv) + ' ' : ''}${fmtHM(lv)} 出發前往機場`);
    if (fl.airline) note.push(`航班 ${fl.airline}`);
    const act = {
      id: uid(), di, order: -1, by: myName,
      title: `✈️ 搭機 ${fl.depAirport || '出發'} → ${fl.arrAirport || '抵達'}`,
      cat: 'transport', time: fl.depTime || '', cost: 0, loc: fl.depAirport || '',
      note: note.join('\n'), flightKey: key
    };
    trip.days[di].acts.push(act);
    sortDay(trip.days[di]);
    rAct(trip, act);
  });
}

/* 一張航班卡（去程 out / 回程 back） */
function flightCardHtml(trip, key, editable) {
  const f = (trip.flights || {})[key];
  const label = key === 'out' ? '去程 OUTBOUND' : '回程 RETURN';
  if (!hasFlight(f)) return '';
  const dep = parseDT(f.depDate, f.depTime), arr = parseDT(f.arrDate, f.arrTime);
  const dur = flightDurMins(f);
  const lv = leaveTime(f);
  const lead = (Number(f.checkin) || 0) + (Number(f.commute) || 0);
  const meta = `🚕 通勤 ${Number(f.commute) || 0} 分　🛂 報到/安檢預留 ${Number(f.checkin) || 0} 分　🛫 ${f.depTime || '--:--'} 起飛`;
  const verb = key === 'out' ? '🏠 建議 ' : '🏨 建議 ';
  const tail = key === 'out' ? ' 出門' : ' 從住宿出發前往機場';
  let leaveHtml = '';
  if (lead > 0 && lv) {
    leaveHtml = `<div class="fc-leave">${verb}<span class="big">${fmtMD(lv)} ${fmtHM(lv)}</span>${tail}<br>${meta}</div>`;
  } else {
    leaveHtml = `<div class="fc-leave">⚠️ 填「通勤」與「報到/安檢預留」分鐘數，就會自動算出發時刻<br>${meta}</div>`;
  }
  return `
    <div class="flight-card ${key}">
      ${editable ? `<button class="fc-edit" title="編輯航班" onclick="openFlightModal('${trip.id}')">✏️</button>` : ''}
      <span class="fc-tag">${label}</span>${f.airline ? `<span class="fc-no">${esc(f.airline)}</span>` : ''}
      <div class="fc-route">
        <div class="fc-end">
          <div class="ap">${esc(f.depAirport || '出發')}</div>
          <div class="tm">${f.depTime || '--:--'}</div>
          <div class="dt">${dep ? fmtMD(dep) : ''}</div>
        </div>
        <div class="fc-mid">
          <div class="arrow">✈︎</div>
          <div class="pl">${dur ? '飛行 ' + durLabel(dur) : '直飛'}</div>
        </div>
        <div class="fc-end">
          <div class="ap">${esc(f.arrAirport || '抵達')}</div>
          <div class="tm">${f.arrTime || '--:--'}</div>
          <div class="dt">${arr ? fmtMD(arr) : ''}</div>
        </div>
      </div>
      ${leaveHtml}
    </div>`;
}

function deleteTrip(id) {
  const t = getTrip(id);

  const msg = t.roomId
    ? `確定刪除「${t.name}」？只會從你這台裝置移除（同伴的雲端行程不受影響）。`

  if (!confirm(msg)) return;
  // 共編行程要先退訂同步，否則監聽器一有動靜會把行程「復活」
  if (t.roomId && activeRoomId === t.roomId) unsubscribeRoom();
  state.trips = state.trips.filter(x => x.id !== id);
  save(); render(); toast('已刪除行程');
}

function deleteAct(di, ai) {

  trip.days[di].acts.splice(ai, 1);

      <label>地點（選填）— 定位不準時，可貼 Google 的 <b>Plus Code</b> 或<b>座標</b>最精準</label>
      <input id="mActLoc" maxlength="80" placeholder="地名 / 地址 / Plus Code（853C+F2 香港）/ 座標（22.30,114.17）" value="${act ? esc(act.loc || '') : ''}">
    </div>
    <div class="field">
      <label>訂位 / 網址連結（選填，會變成可點連結）</label>
      <input id="mActLink" maxlength="300" placeholder="例如：訂房或餐廳訂位網址" value="${act ? esc(act.link || '') : ''}">
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <textarea id="mActNote" maxlength="500" placeholder="訂位資訊、注意事項…">${act ? esc(act.note || '') : ''}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveActModal(${di},${ai !== undefined ? ai : -1})">儲存</button>
    </div>
  `);
  document.getElementById('mActTitle').focus();
}

function pickCat(k) {
  actModalCat = k;
  document.querySelectorAll('#catPicker .cat-chip').forEach(ch => {
    const on = ch.dataset.cat === k;
    ch.classList.toggle('sel', on);
    ch.style.background = on ? CATS[k].color : '';
  });
}

function saveActModal(di, ai) {
  const title = document.getElementById('mActTitle').value.trim();
  if (!title) return toast('請輸入活動名稱');
  const trip = getTrip(view.tripId);
  const prev = ai >= 0 ? trip.days[di].acts[ai] : null;
  const loc = document.getElementById('mActLoc').value.trim();
  const locUnchanged = prev && prev.loc === loc;   // 地點沒改才保留手動修正的座標
  const act = {
    id: prev ? prev.id : uid(),
    di,
    order: prev ? (prev.order || 0) : Date.now(),
    by: prev ? (prev.by || myName) : myName,
    title,
    cat: actModalCat,
    time: document.getElementById('mActTime').value,
    endTime: document.getElementById('mActEnd').value,
    cost: Number(document.getElementById('mActCost').value) || 0,
    loc,
    link: document.getElementById('mActLink').value.trim(),
    note: document.getElementById('mActNote').value.trim(),
    travel: locUnchanged ? prev.travel : undefined,
    flightKey: prev ? prev.flightKey : undefined,   // 保留航班標記，避免編輯後失聯
    lat: locUnchanged ? prev.lat : undefined,
    lon: locUnchanged ? prev.lon : undefined,
  };
  if (ai >= 0) trip.days[di].acts[ai] = act;
  else trip.days[di].acts.push(act);
  sortDay(trip.days[di]);
  save(); closeModal(); render();
  rAct(trip, act);
}

/* ---- 拖曳排序（拖完後清掉時間排序的鎖定 → 改為手動順序） ---- */
/* 用上下箭頭調整順序（手機友善，不靠拖曳） */
function moveAct(di, ai, dir) {
  const trip = getTrip(view.tripId);
  const acts = trip.days[di].acts;
  const to = ai + dir;
  if (to < 0 || to >= acts.length) return;
  const [m] = acts.splice(ai, 1);
  acts.splice(to, 0, m);
  acts.forEach((a, i) => { a.order = i; a.di = di; });
  save(); render();
  if (isShared(trip)) acts.forEach(a => rAct(trip, a));
}

let dragIndex = null;
function bindDrag(trip) {
  const items = app.querySelectorAll('.act-item');
  items.forEach(item => {
    item.addEventListener('dragstart', e => {
      dragIndex = Number(item.dataset.ai);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      items.forEach(i => i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      item.classList.add('drag-over');
    });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      const to = Number(item.dataset.ai);
      if (dragIndex === null || dragIndex === to) return;
      const acts = trip.days[view.dayIndex].acts;
      const [moved] = acts.splice(dragIndex, 1);
      acts.splice(to, 0, moved);
      // 重排後重新編號 order，並確保每個活動的「第幾天」正確（避免上傳後跑掉）
      acts.forEach((a, i) => { a.order = i; a.di = view.dayIndex; });
      dragIndex = null;
      save(); render();
      if (isShared(trip)) acts.forEach(a => rAct(trip, a));
    });
  });
}

document.getElementById('btnTips').onclick = showTips;

/* ===================== 匯出 / 匯入 ===================== */
document.getElementById('btnExport').onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `trip-planner-備份-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('已下載備份檔');
};

document.getElementById('btnImport').onclick = () => document.getElementById('fileImport').click();
document.getElementById('fileImport').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.trips)) throw new Error('格式不符');
      if (!confirm(`匯入 ${data.trips.length} 個行程？將覆蓋目前所有資料。`)) return;
      state = data;
      save();
      view = { page: 'list' };
      render();
      toast('匯入成功！');
    } catch (err) {
      toast('⚠️ 匯入失敗：不是有效的備份檔');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

/* 複製純文字版行程（方便貼到 LINE / 訊息分享） */
function exportText(id) {
  const trip = getTrip(id);
  let lines = [`【${trip.name}】${fmtRange(trip)}`];

  const ff = trip.flights || {};
  [['out', '🛫 去程'], ['back', '🛬 回程']].forEach(([k, lbl]) => {
    const f = ff[k];
    if (!hasFlight(f)) return;
    lines.push('');
    lines.push(`${lbl} ${f.airline || ''}`.trim());
    const dep = parseDT(f.depDate, f.depTime), arr = parseDT(f.arrDate, f.arrTime);
    lines.push(`  ${f.depAirport || '出發'} ${dep ? fmtMD(dep) + ' ' : ''}${f.depTime || '--:--'} → ${f.arrAirport || '抵達'} ${arr ? fmtMD(arr) + ' ' : ''}${f.arrTime || '--:--'}`);
    const lv = leaveTime(f);
    const lead = (Number(f.checkin) || 0) + (Number(f.commute) || 0);
    if (lv && lead > 0) lines.push(`  🏠 建議 ${k === 'out' ? fmtMD(lv) + ' ' : ''}${fmtHM(lv)} 出發（通勤 ${Number(f.commute) || 0}分＋報到安檢 ${Number(f.checkin) || 0}分）`);
  });

  trip.days.forEach((day, i) => {
    const d = dayDate(trip, i);
    lines.push('');
    lines.push(`▍第 ${i + 1} 天 ${d.getMonth() + 1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）`);
    if (!day.acts.length) lines.push('（無安排）');
    day.acts.forEach(a => {
      const tt = a.time ? (a.endTime ? `${a.time}–${a.endTime}` : a.time) : '--:--';
      let l = `${tt} [${(CATS[a.cat] || CATS.other).name}] ${a.title}`;
      if (Number(a.cost)) l += `（${money(trip, Number(a.cost))}）`;
      if (a.travel) l = `　↓ 🚗 約 ${a.travel.mins} 分（${a.travel.km} km）\n` + l;
      lines.push(l);
      if (a.loc) lines.push(`        📍${a.loc}`);
      if (a.link) lines.push(`        🔗${linkHref(a.link)}`);
    });
  });
  const cost = tripCost(trip);
  lines.push('');
  lines.push(`總花費：${money(trip, cost)}${twdHint(trip, cost)}${trip.budget ? ` / 預算 ${money(trip, trip.budget)}` : ''}`);

  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(
    () => toast('已複製行程文字，可直接貼上分享！'),
    () => { // clipboard API 在 file:// 可能被擋，退回舊方法
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      ta.remove();
      toast('已複製行程文字！');
    }
  );
}

/* ===================== 通用 UI ===================== */
let modalEl = null;
function showModal(inner) {
  closeModal();
  modalEl = document.createElement('div');
  modalEl.className = 'modal-mask';
  modalEl.innerHTML = `<div class="modal">${inner}</div>`;
  modalEl.addEventListener('click', e => { if (e.target === modalEl) closeModal(); });
  document.body.appendChild(modalEl);
}
function closeModal() {
  if (modalEl) { modalEl.remove(); modalEl = null; }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ===================== 啟動：處理共編邀請連結 ===================== */
(function bootstrap() {
  const params = new URLSearchParams(location.search);
  let cfg = null;
  const urlCfg = params.get('cfg');
  if (urlCfg) { try { cfg = b64decode(urlCfg); } catch (e) {} }
  if (!cfg) cfg = getFbConfig();
  if (cfg) initFirebase(cfg);

  const room = params.get('room');
  if (room && db) {
    ensureName();
    let trip = state.trips.find(t => t.roomId === room);
    const today = new Date().toISOString().slice(0, 10);
    if (!trip) {
      trip = { id: uid(), roomId: room, name: '共享行程', start: today, end: today,
        budget: 0, currency: 'NT$', rate: 0, days: [] };
      syncDays(trip);
      state.trips.push(trip);
    }
    subscribeRoom(trip);
    view = { page: 'trip', tripId: trip.id, dayIndex: 0 };
    history.replaceState({}, '', location.pathname);  // 清掉網址參數
    toast('已加入共編行程，載入中…');
  }
})();

render();
