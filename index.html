<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行程規劃工具</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3b6ef5">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="行程規劃">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --ink: #1e2430;
    --ink-soft: #6b7384;
    --line: #e3e7f0;
    --primary: #3b6ef5;
    --primary-soft: #e8eefe;
    --danger: #e25555;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(30,40,70,.07);
    --cat-sight: #3b6ef5;
    --cat-food: #e8843c;
    --cat-transport: #18a999;
    --cat-hotel: #8b5cf6;
    --cat-shop: #d6489a;
    --cat-other: #7a8499;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 15px; }

  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar h1 { font-size: 19px; letter-spacing: .5px; }
  .topbar h1 .logo { margin-right: 6px; }
  .topbar .spacer { flex: 1; }
  .btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 14px;
    transition: .15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }
  .btn.primary:hover { filter: brightness(1.08); color:#fff; }
  .btn.danger-text { color: var(--danger); }
  .btn.danger-text:hover { border-color: var(--danger); }
  .btn.small { padding: 5px 10px; font-size: 13px; border-radius: 8px; }

  .container { max-width: 1040px; margin: 0 auto; padding: 24px 16px 80px; }

  /* ===== 行程列表頁 ===== */
  .trip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 18px; }
  .trip-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: .15s;
    position: relative;
  }
  .trip-card:hover { transform: translateY(-2px); border-color: var(--primary); }
  .trip-card h3 { font-size: 17px; margin-bottom: 6px; padding-right: 28px; word-break: break-all; }
  .trip-card .dates { color: var(--ink-soft); font-size: 13px; margin-bottom: 10px; }
  .trip-card .meta { display: flex; gap: 14px; font-size: 13px; color: var(--ink-soft); }
  .trip-card .del-trip {
    position: absolute; top: 12px; right: 12px;
    border: none; background: none; color: #c2c8d6; font-size: 16px; padding: 4px;
  }
  .trip-card .del-trip:hover { color: var(--danger); }
  .empty-hint {
    text-align: center; color: var(--ink-soft); padding: 70px 20px;
    background: var(--card); border: 1px dashed var(--line); border-radius: var(--radius); margin-top: 18px;
  }
  .empty-hint .big { font-size: 42px; margin-bottom: 12px; }

  /* ===== 行程詳細頁 ===== */
  .trip-header {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .trip-header .row1 { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .trip-header h2 { font-size: 21px; flex: 1; min-width: 200px; word-break: break-all; }
  .trip-header .dates { color: var(--ink-soft); font-size: 14px; margin-top: 6px; }
  .budget-bar { margin-top: 14px; }
  .budget-bar .labels { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink-soft); margin-bottom: 5px; }
  .budget-bar .labels b { color: var(--ink); }
  .budget-track { height: 8px; background: var(--primary-soft); border-radius: 99px; overflow: hidden; }
  .budget-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width .3s; }
  .budget-fill.over { background: var(--danger); }

  .day-tabs {
    display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px 10px;
    -webkit-overflow-scrolling: touch;
  }
  .day-tab {
    border: 1px solid var(--line); background: var(--card); border-radius: 10px;
    padding: 8px 14px; font-size: 14px; flex: 0 0 auto; text-align: center; transition: .15s;
  }
  .day-tab .wd { display: block; font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .day-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .day-tab.active .wd { color: rgba(255,255,255,.8); }

  .day-panel {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px 20px;
  }
  .day-panel .day-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .day-panel .day-head h3 { font-size: 17px; flex: 1; }
  .day-cost { font-size: 14px; color: var(--ink-soft); }
  .day-cost b { color: var(--ink); }

  /* 時間軸 */
  .timeline { position: relative; }
  .act-item {
    display: flex; gap: 14px; padding: 12px 8px; border-radius: 10px;
    position: relative; transition: background .15s;
  }
  .act-item:hover { background: #f8f9fd; }
  .act-item.dragging { opacity: .4; }
  .act-item.drag-over { box-shadow: 0 -2px 0 var(--primary); }
  .act-time {
    flex: 0 0 56px; text-align: right; font-size: 14px; font-weight: 600;
    color: var(--ink); padding-top: 2px; font-variant-numeric: tabular-nums;
  }
  .act-time.none { color: #c2c8d6; font-weight: 400; }
  .act-rail { flex: 0 0 14px; display: flex; flex-direction: column; align-items: center; }
  .act-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .act-line { width: 2px; flex: 1; background: var(--line); margin-top: 4px; }
  .act-item:last-child .act-line { display: none; }
  .act-body { flex: 1; min-width: 0; }
  .act-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .act-title { font-size: 15.5px; font-weight: 600; word-break: break-all; }
  .act-cat-badge {
    font-size: 11.5px; padding: 2px 8px; border-radius: 99px; color: #fff; flex-shrink: 0;
  }
  .act-cost-badge { font-size: 13px; color: var(--ink-soft); }
  .act-end-time { display: block; font-size: 11px; color: var(--ink-soft); font-weight: 400; margin-top: 1px; }
  .dur-badge { font-size: 11.5px; color: var(--ink-soft); background: #eef2fa; border-radius: 99px; padding: 1px 8px; flex-shrink: 0; }
  .overlap-warn { font-size: 12.5px; color: var(--danger); margin-top: 3px; font-weight: 600; }
  .act-note { font-size: 13.5px; color: var(--ink-soft); margin-top: 4px; white-space: pre-wrap; word-break: break-all; }
  .act-loc { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
  .act-loc a { color: var(--primary); text-decoration: none; }
  .act-loc a:hover { text-decoration: underline; }
  .act-tools { display: flex; gap: 4px; opacity: 0; transition: .15s; flex-shrink: 0; }
  .act-item:hover .act-tools, .act-item:focus-within .act-tools { opacity: 1; }
  .icon-btn {
    border: none; background: none; color: var(--ink-soft); font-size: 15px;
    padding: 4px 6px; border-radius: 6px;
  }
  .icon-btn:hover { background: var(--primary-soft); color: var(--primary); }
  .icon-btn.danger:hover { background: #fdecec; color: var(--danger); }
  .icon-btn:disabled { opacity: .25; cursor: default; }
  .icon-btn:disabled:hover { background: none; color: var(--ink-soft); }
  .drag-handle { cursor: grab; color: #c2c8d6; }
  .drag-handle:active { cursor: grabbing; }
  .day-empty { text-align: center; color: var(--ink-soft); padding: 30px 10px; font-size: 14px; }

  /* 路線時間 chip（夾在兩個活動之間） */
  .travel-row { display: flex; gap: 14px; padding: 0 8px; }
  .travel-row .t-spacer { flex: 0 0 56px; }
  .travel-row .t-rail { flex: 0 0 14px; display: flex; justify-content: center; }
  .travel-row .t-rail i { width: 2px; background: var(--line); display: block; }
  .travel-pill {
    font-size: 12.5px; color: var(--ink-soft); background: #eef2fa;
    border-radius: 99px; padding: 4px 12px; margin: 2px 0;
  }

  /* ===== 行程表總覽 ===== */
  .ov-hero {
    background: linear-gradient(135deg, #3b6ef5 0%, #7c5cf6 60%, #a35cf6 100%);
    color: #fff; border-radius: 18px; padding: 28px 26px; margin-bottom: 18px;
    box-shadow: 0 6px 22px rgba(80,90,220,.25);
  }
  .ov-hero h2 { font-size: 26px; letter-spacing: .5px; word-break: break-all; }
  .ov-hero .sub { opacity: .88; margin-top: 8px; font-size: 14.5px; }
  .ov-stats { display: flex; gap: 26px; margin-top: 18px; flex-wrap: wrap; }
  .ov-stat b { font-size: 21px; display: block; font-variant-numeric: tabular-nums; }
  .ov-stat span { font-size: 12.5px; opacity: .82; }
  .ov-day {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .ov-day-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .ov-day-head h3 { font-size: 16.5px; }
  .ov-day-head .chip {
    font-size: 12px; background: var(--primary-soft); color: var(--primary);
    border-radius: 99px; padding: 3px 11px;
  }
  .ov-day-head .spend { margin-left: auto; font-size: 13px; color: var(--ink-soft); }
  @media print {
    .ov-hero { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .ov-day { page-break-inside: avoid; }
  }
  .add-act-btn {
    width: 100%; margin-top: 12px; border: 1.5px dashed var(--line); background: none;
    border-radius: 10px; padding: 11px; color: var(--ink-soft); font-size: 14.5px; transition: .15s;
  }
  .add-act-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }

  /* ===== Modal ===== */
  .modal-mask {
    position: fixed; inset: 0; background: rgba(20,26,40,.45); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .modal {
    background: var(--card); border-radius: 16px; width: 100%; max-width: 460px;
    padding: 22px; max-height: 92vh; overflow-y: auto;
  }
  .modal h3 { font-size: 18px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13.5px; color: var(--ink-soft); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px;
    background: #fbfcfe; outline: none; transition: .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--primary); background: #fff;
  }
  .field textarea { resize: vertical; min-height: 64px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .cat-picker { display: flex; gap: 7px; flex-wrap: wrap; }
  .cat-chip {
    border: 1.5px solid var(--line); background: #fbfcfe; border-radius: 99px;
    padding: 6px 13px; font-size: 13.5px; transition: .15s; color: var(--ink-soft);
  }
  .cat-chip.sel { color: #fff; border-color: transparent; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .tips-list { list-style: none; }
  .tips-list li {
    display: flex; gap: 10px; padding: 9px 0; font-size: 14px; line-height: 1.65;
    border-bottom: 1px dashed var(--line);
  }
  .tips-list li:last-child { border-bottom: none; }
  .tips-list .t-icon { flex-shrink: 0; }
  .tips-list b { color: var(--ink); }

  /* ===== 航班卡 ===== */
  .flights-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
  .flight-card {
    border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; background: #fbfcff;
    position: relative;
  }
  .flight-card .fc-tag {
    font-size: 11.5px; font-weight: 600; letter-spacing: .5px; padding: 2px 9px; border-radius: 99px;
    color: #fff; display: inline-block; margin-bottom: 10px;
  }
  .flight-card.out .fc-tag { background: var(--cat-transport); }
  .flight-card.back .fc-tag { background: var(--cat-hotel); }
  .flight-card .fc-no { font-size: 13px; color: var(--ink-soft); margin-left: 8px; }
  .fc-route { display: flex; align-items: center; gap: 10px; }
  .fc-end { text-align: center; min-width: 0; flex: 1; }
  .fc-end .ap { font-size: 15px; font-weight: 700; word-break: break-all; }
  .fc-end .tm { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .fc-end .dt { font-size: 11.5px; color: var(--ink-soft); }
  .fc-mid { flex: 0 0 auto; text-align: center; color: var(--cat-transport); }
  .fc-mid .pl { font-size: 11.5px; color: var(--ink-soft); white-space: nowrap; }
  .fc-mid .arrow { font-size: 18px; line-height: 1; }
  .fc-leave {
    margin-top: 12px; padding-top: 11px; border-top: 1px dashed var(--line);
    font-size: 13px; line-height: 1.7; color: var(--ink-soft);
  }
  .fc-leave .big { font-size: 15px; font-weight: 700; color: var(--primary); }
  .fc-leave .warn { color: var(--danger); font-weight: 600; }
  .flight-card .fc-edit {
    position: absolute; top: 11px; right: 11px; border: none; background: none;
    color: #c2c8d6; font-size: 14px; padding: 3px 5px; border-radius: 6px;
  }
  .flight-card .fc-edit:hover { background: var(--primary-soft); color: var(--primary); }
  .flight-empty {
    grid-column: 1 / -1; text-align: center; color: var(--ink-soft); font-size: 13.5px;
    border: 1.5px dashed var(--line); border-radius: 12px; padding: 16px;
  }
  .flight-empty .btn { margin-top: 8px; }
  .flight-sub { font-size: 13px; color: var(--ink-soft); margin: 4px 0 2px; font-weight: 600; }

  /* ===== 共編 / 貢獻者 ===== */
  .by-badge {
    font-size: 11px; background: #eef2fa; color: #5b677e;
    border-radius: 99px; padding: 1px 8px; flex-shrink: 0;
  }
  .collab-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-top: 12px; padding: 8px 12px; background: #ecfdf5; border: 1px solid #b7e8d2;
    border-radius: 10px; font-size: 13px; color: #15795a;
  }
  .collab-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .collab-bar .room { font-weight: 700; letter-spacing: .5px; }
  .collab-bar .spacer { flex: 1; }
  .share-link {
    width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px;
    background: #fbfcfe; font-size: 12.5px; font-family: monospace; word-break: break-all;
  }
  .step-list { font-size: 13.5px; line-height: 1.7; color: var(--ink-soft); padding-left: 18px; margin: 6px 0 14px; }
  .step-list a { color: var(--primary); }
  .step-list code { background: #eef2fa; padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }

  /* ===== 最短路徑結果 ===== */
  .opt-summary {
    margin: 4px 0 12px; padding: 10px 14px; background: var(--primary-soft);
    border-radius: 10px; font-size: 13.5px; color: var(--primary); line-height: 1.6;
  }
  .opt-summary b { font-weight: 700; }

  /* ===== 兩欄版面 + 候選地點側欄 ===== */
  .trip-layout { display: grid; grid-template-columns: 1fr 400px; gap: 16px; align-items: start; }
  .trip-main { min-width: 0; }
  .tray {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 15px; position: sticky; top: 76px;
  }
  .tray h3 { font-size: 15px; display: flex; align-items: center; gap: 6px; }
  .tray .hint { font-size: 12px; color: var(--ink-soft); margin: 6px 0 10px; line-height: 1.5; }
  .tray-actions { display: flex; gap: 7px; margin-bottom: 10px; }
  .tray-actions .btn { flex: 1; padding: 7px; font-size: 13px; }
  .tray-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 64vh; overflow-y: auto; padding-right: 2px; }
  .tray-card {
    border: 1px solid var(--line); border-radius: 10px; padding: 9px 10px; background: #fbfcff;
    cursor: grab; transition: .12s; position: relative; display: flex; flex-direction: column;
  }
  .tray-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(60,90,220,.1); }
  .tray-card:active { cursor: grabbing; }
  .tray-card.dragging { opacity: .45; }
  .tray-card .tc-name { font-size: 13.5px; font-weight: 600; word-break: break-all; padding-right: 16px; line-height: 1.35; }
  .tray-card .tc-sub { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; word-break: break-all; }
  .tray-card .tc-row { display: flex; gap: 6px; margin-top: auto; padding-top: 7px; }
  .tray-card .tc-row .btn { padding: 4px 8px; font-size: 12px; border-radius: 7px; width: 100%; text-align: center; }
  .tray-card .tc-del {
    position: absolute; top: 6px; right: 7px; border: none; background: none; color: #c2c8d6;
    font-size: 13px; padding: 2px 4px; border-radius: 5px;
  }
  .tray-card .tc-del:hover { color: var(--danger); background: #fdecec; }
  .tray-empty { font-size: 12.5px; color: var(--ink-soft); text-align: center; padding: 22px 8px; border: 1.5px dashed var(--line); border-radius: 10px; }
  .tray-badge { font-size: 11px; background: var(--primary-soft); color: var(--primary); border-radius: 99px; padding: 1px 8px; }
  /* 拖放目標高亮 */
  .day-tab.drop-active, .day-panel.drop-active { outline: 2px dashed var(--primary); outline-offset: 2px; background: var(--primary-soft); }

  @media (max-width: 900px) {
    .trip-layout { grid-template-columns: 1fr; }
    .tray { position: static; order: -1; }
    .tray-list { max-height: 48vh; }
  }

  /* ===== 地圖 ===== */
  .map-box { height: 440px; border-radius: 12px; overflow: hidden; margin-bottom: 8px; border: 1px solid var(--line); background: #eef2f7; }
  .map-loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--ink-soft); font-size: 14px; text-align: center; padding: 0 16px; }
  .map-legend { font-size: 12px; color: var(--ink-soft); margin: 0 0 14px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .map-legend .lg-line { display: inline-block; width: 20px; height: 0; border-top: 3px dashed var(--primary); }
  .map-legend .lg-pool { display: inline-block; width: 11px; height: 11px; border-radius: 50%; background: #fff; border: 2px solid #8a93a6; }
  .pin-num {
    width: 26px; height: 26px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700;
    font-size: 13px; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.35);
  }
  .pin-num span { transform: rotate(45deg); }
  .pin-pool { width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 2.5px solid #8a93a6; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
  .pin-place { background: #e8843c !important; border-style: dashed !important; animation: pulse 1.3s infinite; }
  /* 手機：長按地圖不要變成選字，拖曳圖釘才順 */
  .leaflet-container, .leaflet-container * { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-touch-callout: none; }
  .leaflet-marker-icon { touch-action: none; }
  .map-place-btn {
    margin-top: 7px; border: 1px solid var(--primary); background: var(--primary); color: #fff;
    border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; width: 100%;
  }
  .map-place-btn:active { filter: brightness(.92); }
  .leaflet-popup-content { font-size: 13px; line-height: 1.5; }
  .ov-map { height: 300px; border-radius: 12px; overflow: hidden; margin: 4px 0 14px; border: 1px solid var(--line); background: #eef2f7; position: relative; }
  .ov-map .map-loading { position: absolute; inset: 0; }
  @media print { .ov-map { height: 220px; } }

  /* ===== 分帳 ===== */
  .split-hero {
    background: linear-gradient(135deg, #18a999 0%, #3b6ef5 100%); color: #fff;
    border-radius: 16px; padding: 22px 24px; margin-bottom: 16px;
  }
  .split-hero h2 { font-size: 22px; word-break: break-all; }
  .split-hero .sub { opacity: .9; margin-top: 6px; font-size: 14px; }
  .split-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; margin-bottom: 14px; }
  .split-card h3 { font-size: 16px; margin-bottom: 12px; }
  .people-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .person-chip { background: var(--primary-soft); color: var(--primary); border-radius: 99px; padding: 5px 8px 5px 13px; font-size: 14px; display: inline-flex; align-items: center; gap: 4px; }
  .person-chip button { border: none; background: none; color: var(--primary); cursor: pointer; font-size: 13px; opacity: .6; padding: 0 3px; }
  .person-chip button:hover { opacity: 1; color: var(--danger); }
  .person-add { display: flex; gap: 8px; }
  .person-add input { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 8px 11px; background: #fbfcfe; }
  .exp-list { display: flex; flex-direction: column; }
  .exp-row { display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid var(--line); }
  .exp-row:last-child { border-bottom: none; }
  .exp-main { flex: 1; min-width: 0; }
  .exp-title { font-size: 14.5px; font-weight: 600; word-break: break-all; }
  .exp-title .exp-date { font-size: 11.5px; color: var(--ink-soft); font-weight: 400; margin-left: 6px; }
  .exp-sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; word-break: break-all; }
  .exp-amt { font-size: 15px; font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .exp-tools { display: flex; gap: 2px; flex-shrink: 0; }
  .bal-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .bal-table th, .bal-table td { text-align: right; padding: 7px 6px; border-bottom: 1px solid var(--line); }
  .bal-table th:first-child, .bal-table td:first-child { text-align: left; }
  .bal-table th { color: var(--ink-soft); font-weight: 600; font-size: 12.5px; }
  .bal-table td.pos { color: #15795a; font-weight: 700; }
  .bal-table td.neg { color: var(--danger); font-weight: 700; }
  .settle-list { display: flex; flex-direction: column; gap: 8px; }
  .settle-row { background: #f0fbf7; border: 1px solid #b7e8d2; border-radius: 10px; padding: 10px 14px; font-size: 14.5px; }
  .settle-row .settle-amt { float: right; font-weight: 700; color: #15795a; }
  .split-picker { display: flex; flex-wrap: wrap; gap: 8px 14px; }
  .split-chk { display: inline-flex; align-items: center; gap: 5px; font-size: 14px; cursor: pointer; }
  @media (max-width: 560px) { .flights-wrap { grid-template-columns: 1fr; } }
  @media print { .flight-card { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 99px;
    font-size: 14px; z-index: 200; opacity: 0; transition: .25s; pointer-events: none;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; }

  .back-link {
    display: inline-flex; align-items: center; gap: 5px; color: var(--ink-soft);
    font-size: 14px; border: none; background: none; padding: 0 0 14px;
  }
  .back-link:hover { color: var(--primary); }

  /* ===== 列印 ===== */
  @media print {
    body { background: #fff; }
    .topbar, .back-link, .day-tabs, .add-act-btn, .act-tools, .trip-header .row1 .btn, .ov-hero .btn { display: none !important; }
    .day-panel, .trip-header { border: none; box-shadow: none; padding: 8px 0; }
    .day-panel { page-break-inside: avoid; margin-bottom: 14px; border-bottom: 1px solid #ddd; }
    .container { max-width: 100%; padding: 0; }
    .print-all .day-panel { display: block !important; }
  }

  @media (max-width: 560px) {
    .topbar { padding: 12px 14px; flex-wrap: wrap; }
    .topbar h1 { font-size: 17px; }
    .container { padding: 16px 10px 70px; }
    .act-time { flex-basis: 48px; font-size: 13px; }
    .act-tools { opacity: 1; }
    .trip-header { padding: 15px 16px; }
    .day-panel { padding: 14px 12px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1><span class="logo">🗺️</span>行程規劃</h1>
  <div class="spacer"></div>
  <button class="btn small" id="btnTips" title="使用小提醒">💡 小提醒</button>
  <button class="btn small" id="btnImport" title="匯入 JSON">📥 匯入</button>
  <button class="btn small" id="btnExport" title="匯出 JSON 備份">📤 匯出</button>
  <input type="file" id="fileImport" accept=".json" hidden>
</div>

<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<!-- Firebase（即時共編用，免費 CDN；沒網路時工具仍可純本機使用） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- Leaflet 地圖（免費 OpenStreetMap，免金鑰） -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
'use strict';

/* ===================== 資料層 ===================== */
const STORE_KEY = 'tripPlanner.v1';
const CATS = {
  sight:     { name: '景點', color: 'var(--cat-sight)' },
  food:      { name: '美食', color: 'var(--cat-food)' },
  transport: { name: '交通', color: 'var(--cat-transport)' },
  hotel:     { name: '住宿', color: 'var(--cat-hotel)' },
  shop:      { name: '購物', color: 'var(--cat-shop)' },
  other:     { name: '其他', color: 'var(--cat-other)' },
};
const WEEKDAYS = ['日','一','二','三','四','五','六'];
/* 地圖圖釘用的實色（對應 :root 的 --cat-*；Leaflet 圖釘無法用 CSS 變數） */
const CAT_HEX = { sight:'#3b6ef5', food:'#e8843c', transport:'#18a999', hotel:'#8b5cf6', shop:'#d6489a', other:'#7a8499' };

let state = load();
let view = { page: 'list', tripId: null, dayIndex: 0 };

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (Array.isArray(data.trips)) return data;
    }
  } catch (e) { console.warn('讀取資料失敗', e); }
  return { trips: [] };
}
function save() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch (e) {
    toast('⚠️ 儲存失敗：' + e.message);
  }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function getTrip(id) { return state.trips.find(t => t.id === id); }

/* 依起訖日期計算天數（含首尾） */
function tripDays(trip) {
  const s = new Date(trip.start + 'T00:00:00');
  const e = new Date(trip.end + 'T00:00:00');
  const n = Math.max(1, Math.round((e - s) / 86400000) + 1);
  return Math.min(n, 60); // 上限 60 天，避免日期填錯時撐爆畫面
}
function dayDate(trip, i) {
  const d = new Date(trip.start + 'T00:00:00');
  d.setDate(d.getDate() + i);
  return d;
}
function fmtDate(d) {
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
function fmtRange(trip) {
  const s = new Date(trip.start + 'T00:00:00');
  const e = new Date(trip.end + 'T00:00:00');
  return `${s.getFullYear()}/${fmtDate(s)} – ${e.getFullYear() !== s.getFullYear() ? e.getFullYear() + '/' : ''}${fmtDate(e)}（${tripDays(trip)} 天）`;
}

/* 確保 trip.days 陣列長度與日期區間一致（改日期後多退少補） */
function syncDays(trip) {
  const n = tripDays(trip);
  if (!Array.isArray(trip.days)) trip.days = [];
  while (trip.days.length < n) trip.days.push({ acts: [] });
  if (trip.days.length > n) {
    // 把被砍掉天數的活動併到最後一天，避免資料默默消失
    const overflow = trip.days.splice(n);
    const orphan = overflow.flatMap(d => d.acts);
    if (orphan.length) trip.days[n - 1].acts.push(...orphan);
  }
}

function dayCost(day)  { return day.acts.reduce((s, a) => s + (Number(a.cost) || 0), 0); }
function tripCost(trip){ return trip.days.reduce((s, d) => s + dayCost(d), 0); }
function tripActCount(trip) { return trip.days.reduce((s, d) => s + d.acts.length, 0); }
function fmtMoney(n) { return n.toLocaleString('zh-TW'); }

/* 幣別：國內預設 NT$；國外行程可自選幣別並填匯率換算台幣 */
const CURRENCIES = ['NT$', '¥ 日圓', '$ 美金', '€ 歐元', '₩ 韓元', '¥ 人民幣', '฿ 泰銖', '$ 港幣', '$ 新加坡幣', '£ 英鎊', '$ 澳幣', '₫ 越南盾'];
function curSymbol(trip) { return (trip.currency || 'NT$').split(' ')[0]; }
function curName(trip) { return trip.currency || 'NT$'; }
function money(trip, n) { return `${curSymbol(trip)}${fmtMoney(n)}`; }
/* 有填匯率且非台幣時，附上約合台幣 */
function twdHint(trip, n) {
  const rate = Number(trip.rate) || 0;
  if (!rate || (trip.currency || 'NT$') === 'NT$' || !n) return '';
  return `（約 NT$${fmtMoney(Math.round(n * rate))}）`;
}

/* 依時間排序：有時間的在前按時間排，沒時間的按 order（建立/最短路徑順序）排在後面 */
function sortDay(day) {
  day.acts.sort((a, b) => {
    if (a.time && b.time) return a.time.localeCompare(b.time) || ((a.order || 0) - (b.order || 0));
    if (a.time) return -1;
    if (b.time) return 1;
    return (a.order || 0) - (b.order || 0);
  });
}

/* ===================== 畫面渲染 ===================== */
const app = document.getElementById('app');

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function render() {
  if (view.page === 'list') renderList();
  else if (view.page === 'overview') renderOverview();
  else if (view.page === 'split') renderSplit();
  else renderTrip();
}

/* ---- 行程列表 ---- */
function renderList() {
  let html = `
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <h2 style="font-size:20px;flex:1">我的行程</h2>
      <button class="btn" onclick="openJoinModal()">🔗 加入共編</button>
      <button class="btn primary" onclick="openTripModal()">＋ 新增行程</button>
    </div>`;

  if (!state.trips.length) {
    html += `
      <div class="empty-hint">
        <div class="big">🧳</div>
        <p>還沒有任何行程</p>
        <p style="margin-top:6px;font-size:13.5px">點「新增行程」開始規劃你的下一趟旅行吧！</p>
      </div>`;
  } else {
    html += '<div class="trip-grid">';
    for (const t of state.trips) {
      const cost = tripCost(t);
      html += `
        <div class="trip-card" onclick="openTrip('${t.id}')">
          <button class="del-trip" title="刪除行程" onclick="event.stopPropagation();deleteTrip('${t.id}')">✕</button>
          <h3>${esc(t.name)}</h3>
          <div class="dates">📅 ${fmtRange(t)}</div>
          <div class="meta">
            <span>📍 ${tripActCount(t)} 個活動</span>
            <span>💰 ${money(t, cost)}${t.budget ? ' / ' + money(t, t.budget) : ''}</span>
          </div>
        </div>`;
    }
    html += '</div>';
  }
  app.innerHTML = html;
}

/* ---- 行程詳細 ---- */
function renderTrip() {
  const trip = getTrip(view.tripId);
  if (!trip) { view = { page: 'list' }; return renderList(); }
  // 記住候選清單的捲動位置，重畫（如跳天）後還原，避免被捲回頂端
  const prevTrayScroll = (() => { const el = app.querySelector('.tray-list'); return el ? el.scrollTop : null; })();
  syncDays(trip);
  const n = tripDays(trip);
  if (view.dayIndex >= n) view.dayIndex = n - 1;

  const cost = tripCost(trip);
  const budget = Number(trip.budget) || 0;
  const pct = budget ? Math.min(100, cost / budget * 100) : 0;

  let html = `
    <button class="back-link" onclick="backToList()">← 返回行程列表</button>
    <div class="trip-header">
      <div class="row1">
        <h2>${esc(trip.name)}</h2>
        <button class="btn small" onclick="openTripModal('${trip.id}')">✏️ 編輯</button>
        <button class="btn small" onclick="openFlightModal('${trip.id}')">✈️ 航班</button>
        <button class="btn small" onclick="exportText('${trip.id}')">📋 複製文字</button>
        <button class="btn small" onclick="openSplit('${trip.id}')">💰 分帳</button>
        ${trip.roomId
          ? `<button class="btn small" onclick="showShareModal('${trip.id}')">🔗 邀請</button>`
          : `<button class="btn small" onclick="startShare('${trip.id}')">🤝 共編</button>`}
        <button class="btn small primary" onclick="openOverview()">📄 行程表</button>
      </div>
      <div class="dates">📅 ${fmtRange(trip)}</div>
      ${trip.roomId ? `
      <div class="collab-bar">
        <span class="dot"></span>
        <span>即時共編中 · 房號 <span class="room">${esc(trip.roomId.slice(1, 7))}</span>${myName ? ` · 你是 ${esc(myName)}` : ''}</span>
        <span class="spacer"></span>
        <button class="btn small" onclick="showShareModal('${trip.id}')">邀請同伴</button>
        <button class="btn small danger-text" onclick="leaveShare('${trip.id}')">離開</button>
      </div>` : ''}
      ${flightsBlockHtml(trip, true)}
      ${budget ? `
      <div class="budget-bar">
        <div class="labels">
          <span>已花費 <b>${money(trip, cost)}</b>${twdHint(trip, cost)}</span>
          <span>預算 ${money(trip, budget)}${cost > budget ? `（超支 ${money(trip, cost - budget)}）` : `（剩 ${money(trip, budget - cost)}）`}</span>
        </div>
        <div class="budget-track"><div class="budget-fill ${cost > budget ? 'over' : ''}" style="width:${pct}%"></div></div>
      </div>` : `
      <div class="budget-bar"><div class="labels"><span>總花費 <b>${money(trip, cost)}</b>${twdHint(trip, cost)}</span></div></div>`}
    </div>

    <div class="trip-layout">
    <div class="trip-main">
    <div class="day-tabs">`;

  for (let i = 0; i < n; i++) {
    const d = dayDate(trip, i);
    html += `
      <button class="day-tab ${i === view.dayIndex ? 'active' : ''}" data-daytab="${i}" onclick="switchDay(${i})">
        第 ${i + 1} 天
        <span class="wd">${fmtDate(d)}（${WEEKDAYS[d.getDay()]}）</span>
      </button>`;
  }
  html += '</div>';

  html += renderDayPanel(trip, view.dayIndex);
  html += '</div>';                 // /trip-main
  html += renderTray(trip);
  html += '</div>';                 // /trip-layout
  app.innerHTML = html;
  if (prevTrayScroll != null) { const el = app.querySelector('.tray-list'); if (el) el.scrollTop = prevTrayScroll; }
  bindDrag(trip);
  bindTray(trip);
  if (view.showMap) initDayMap(trip, view.dayIndex);
}

function travelChip(tr) {
  const walk = tr.km <= 2 ? `　🚶 約 ${Math.max(1, Math.round(tr.km / 4.5 * 60))} 分` : '';
  return `
    <div class="travel-row">
      <div class="t-spacer"></div>
      <div class="t-rail"><i></i></div>
      <div><span class="travel-pill">🚗 約 ${tr.mins} 分 · ${tr.km} km${walk}${tr.est ? '（直線估算）' : ''}</span></div>
    </div>`;
}

/* 時間/連結小工具 */
function hmToMin(s) { const p = String(s).split(':'); return (+p[0]) * 60 + (+p[1]); }
function durBadge(a) {
  if (a.time && a.endTime) {
    const d = hmToMin(a.endTime) - hmToMin(a.time);
    if (d > 0) { const h = Math.floor(d / 60), m = d % 60; return `<span class="dur-badge">⏱ ${h ? h + 'h' : ''}${m ? m + 'm' : (h ? '' : '0m')}</span>`; }
  }
  return '';
}
function isOverlap(prev, a) { return !!(prev && prev.time && prev.endTime && a.time && hmToMin(a.time) < hmToMin(prev.endTime)); }
function linkHref(u) { return /^https?:\/\//i.test(u) ? u : ('https://' + u); }
function actEndLabel(a) { return a.endTime ? `<span class="act-end-time">–${a.endTime}</span>` : ''; }

function renderDayPanel(trip, di, readonly) {
  const day = trip.days[di];
  const d = dayDate(trip, di);
  let html = `
    <div class="day-panel" data-day="${di}">
      <div class="day-head">
        <h3>第 ${di + 1} 天 · ${d.getMonth() + 1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）</h3>
        ${readonly ? '' : `<button class="btn small" onclick="estimateRoute(${di})" title="依各活動的「地點」估算之間的車程">⏱️ 估路線</button>
        <button class="btn small" onclick="openOptimizeModal(${di})" title="把這天的地點排成最省車程的順序">🧭 最短路徑</button>
        <button class="btn small" onclick="toggleDayMap()" title="在地圖上看這天的地點與路線">${view.showMap ? '🗺️ 收起地圖' : '🗺️ 看地圖'}</button>`}
        <span class="day-cost">本日花費 <b>${money(trip, dayCost(day))}</b>${twdHint(trip, dayCost(day))}</span>
      </div>
      ${!readonly && day._opt ? `<div class="opt-summary">🧭 已排最短路徑：<b>${day._opt.stops}</b> 個點 · 總車程約 <b>${Math.floor(day._opt.mins / 60) ? Math.floor(day._opt.mins / 60) + ' 小時 ' : ''}${day._opt.mins % 60} 分</b> / ${day._opt.km} km${day._opt.est ? '（直線估算）' : ''}</div>` : ''}
      ${!readonly && view.showMap ? `<div id="mapBox" class="map-box" style="position:relative"></div>
      <div class="map-legend"><span><b style="color:var(--ink)">編號</b>＝當天順序</span><span class="lg-line"></span>路線<span><span class="lg-pool"></span>候選地點</span><span style="color:#e8843c">🟠 橘色＝定位不到，拖到正確處</span><span style="color:var(--primary)">✋ 圖釘可拖曳修正</span></div>` : ''}`;

  if (!day.acts.length) {
    html += `<div class="day-empty">${readonly ? '（這天沒有安排）' : '這天還沒有安排，按下方按鈕新增第一個活動 ✈️'}</div>`;
  } else {
    html += '<div class="timeline">';
    day.acts.forEach((a, ai) => {
      const cat = CATS[a.cat] || CATS.other;
      const prev = ai > 0 ? day.acts[ai - 1] : null;
      if (a.travel && ai > 0) html += travelChip(a.travel);
      html += `
        <div class="act-item" ${readonly || a.flightKey ? '' : 'draggable="true"'} data-ai="${ai}">
          <div class="act-time ${a.time ? '' : 'none'}">${a.time || '--:--'}${actEndLabel(a)}</div>
          <div class="act-rail">
            <div class="act-dot" style="background:${cat.color}"></div>
            <div class="act-line"></div>
          </div>
          <div class="act-body">
            <div class="act-title-row">
              <span class="act-cat-badge" style="background:${cat.color}">${cat.name}</span>
              <span class="act-title">${esc(a.title)}</span>
              ${durBadge(a)}
              ${Number(a.cost) ? `<span class="act-cost-badge">💰 ${money(trip, Number(a.cost))}</span>` : ''}
              ${a.by ? `<span class="by-badge">👤 ${esc(a.by)}</span>` : ''}
            </div>
            ${isOverlap(prev, a) ? `<div class="overlap-warn">⚠️ 與前一項時間重疊</div>` : ''}
            ${a.loc ? `<div class="act-loc">📍 <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a.loc)}" target="_blank" rel="noopener">${esc(a.loc)}</a></div>` : ''}
            ${a.link ? `<div class="act-loc">🔗 <a href="${esc(linkHref(a.link))}" target="_blank" rel="noopener">訂位 / 連結</a></div>` : ''}
            ${a.note ? `<div class="act-note">${esc(a.note)}</div>` : ''}
          </div>
          ${readonly ? '' : `
          <div class="act-tools">
            ${a.flightKey
              ? `<button class="icon-btn" title="這是航班，請從「✈️ 航班」修改" onclick="openFlightModal('${trip.id}')">✈️</button>`
              : `<button class="icon-btn" title="上移" onclick="moveAct(${di},${ai},-1)" ${ai === 0 ? 'disabled' : ''}>▲</button>
            <button class="icon-btn" title="下移" onclick="moveAct(${di},${ai},1)" ${ai === day.acts.length - 1 ? 'disabled' : ''}>▼</button>
            <button class="icon-btn" title="編輯" onclick="openActModal(${di},${ai})">✏️</button>
            <button class="icon-btn danger" title="刪除" onclick="deleteAct(${di},${ai})">🗑️</button>`}
          </div>`}

  return html;
}

/* ===================== 路線時間估算 ===================== */
/* 免費服務：Nominatim 地理編碼 + OSRM 路線（皆為 OSM 公開伺服器，無需金鑰） */
/* 座標快取存進 localStorage：同一地點只查一次，重新整理後地圖/路線秒開 */
let geoCache = (() => {
  try { return JSON.parse(localStorage.getItem('tripPlanner.geo') || '{}'); }
  catch (e) { return {}; }
})();
let geoSaveTimer = null;
function saveGeo() {
  clearTimeout(geoSaveTimer);
  geoSaveTimer = setTimeout(() => {
    try { localStorage.setItem('tripPlanner.geo', JSON.stringify(geoCache)); } catch (e) {}
  }, 400);
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ---- Plus Code（Google 地圖的 +碼）解碼：純算法、免任何服務、精準 ---- */
const OLC_ENC = '23456789CFGHJMPQRVWX';
function olcEncode10(lat, lon) {
  let aLat = lat + 90, aLon = lon + 180, code = '';
  const pr = [20, 1, 0.05, 0.0025, 0.000125];
  for (let i = 0; i < 5; i++) { const r = pr[i]; const ld = Math.floor(aLat / r); aLat -= ld * r; const od = Math.floor(aLon / r); aLon -= od * r; code += OLC_ENC[ld] + OLC_ENC[od]; }
  return code;   // 10 碼，無分隔符
}
function olcDecode(noSep) {
  let lat = -90, lon = -180, res = 20; const pr = [20, 1, 0.05, 0.0025, 0.000125];
  for (let i = 0; i + 1 < noSep.length && i < 10; i += 2) { res = pr[i / 2]; lat += OLC_ENC.indexOf(noSep[i]) * res; lon += OLC_ENC.indexOf(noSep[i + 1]) * res; }
  return { lat: lat + res / 2, lon: lon + res / 2 };
}
function olcRecover(shortCode, refLat, refLon) {
  const sc = shortCode.toUpperCase(); const before = sc.indexOf('+'); const pad = 8 - before;
  if (pad <= 0) return olcDecode(sc.replace('+', ''));
  const prefix = olcEncode10(refLat, refLon).slice(0, pad);
  const r = olcDecode(prefix + sc.replace('+', ''));
  const resolution = Math.pow(20, 2 - pad / 2), half = resolution / 2;
  if (r.lat - refLat > half) r.lat -= resolution; else if (refLat - r.lat > half) r.lat += resolution;
  if (r.lon - refLon > half) r.lon -= resolution; else if (refLon - r.lon > half) r.lon += resolution;
  return r;
}

/* 以「目前行程已知的地點」當中心，替新查詢做距離偏好，讓同名地點優先落在正確城市 */
function geoBias() {
  const trip = getTrip(view.tripId);
  if (!trip || !trip.days) return null;
  const pts = [];
  trip.days.forEach(d => (d.acts || []).forEach(a => {
    const c = (a.lat != null && a.lon != null) ? { lat: a.lat, lon: a.lon } : geoCache[a.loc];
    if (c) pts.push(c);
  }));
  (trip.pool || []).forEach(p => {
    const c = (p.lat != null && p.lon != null) ? { lat: p.lat, lon: p.lon } : geoCache[p.loc];
    if (c) pts.push(c);
  });
  if (!pts.length) return null;
  return { lat: pts.reduce((s, c) => s + c.lat, 0) / pts.length, lon: pts.reduce((s, c) => s + c.lon, 0) / pts.length };
}

let lastGeoDelay = 0;   // 本次查詢該禮貌等多久：座標/Plus Code=0、Photon=600、Nominatim=1100
async function geocode(q) {
  if (geoCache[q] !== undefined) { lastGeoDelay = 0; return geoCache[q]; }
  const trip = getTrip(view.tripId);
  const region = trip && trip.region ? trip.region.trim() : '';
  lastGeoDelay = 0;

  // A) 直接貼座標：「22.305, 114.170」→ 精準
  const mCoord = q.match(/(-?\d{1,3}\.\d{3,})\s*[,，]\s*(-?\d{1,3}\.\d{3,})/);
  if (mCoord) {
    const r = { lat: +mCoord[1], lon: +mCoord[2] };
    if (Math.abs(r.lat) <= 90 && Math.abs(r.lon) <= 180) { geoCache[q] = r; saveGeo(); return r; }
  }
  // B) Google Plus Code：「853C+F2 佐敦 香港」或完整碼 → 精準（免任何服務）
  const mPlus = q.match(/\b([2-9CFGHJMPQRVWXcfghjmpqrvwx]{2,8})\+([2-9CFGHJMPQRVWXcfghjmpqrvwx]{2,})\b/);
  if (mPlus) {
    const short = (mPlus[1] + '+' + mPlus[2]).toUpperCase();
    if (mPlus[1].length >= 8) { const r = olcDecode(short.replace('+', '')); geoCache[q] = r; saveGeo(); return r; }
    // 地名可能在碼前或碼後
    const after = q.slice(mPlus.index + mPlus[0].length).trim();
    const before = q.slice(0, mPlus.index).trim();
    const locality = after || before || region;
    let ref = locality ? await geocode(locality) : null;
    if (!ref) ref = geoBias();
    if (ref) { const r = olcRecover(short, ref.lat, ref.lon); geoCache[q] = r; saveGeo(); return r; }
  }

  const eq = (region && !q.includes(region)) ? (q + ' ' + region) : q;   // 加上主要地區，大幅提升準確度
  let res = null;
  const bias = geoBias();
  // 1) Photon（OSM，POI／模糊搜尋較強、回中英雙名）＋ 行程區域距離偏好
  try {
    const u = 'https://photon.komoot.io/api/?limit=1&q=' + encodeURIComponent(eq) + (bias ? `&lat=${bias.lat}&lon=${bias.lon}` : '');
    const p = await (await fetchTimeout(u)).json();
    lastGeoDelay = 600;
    if (p.features && p.features[0] && p.features[0].geometry) {
      const c = p.features[0].geometry.coordinates;   // [lon, lat]
      res = { lat: c[1], lon: c[0] };
    }
  } catch (e) { /* Photon 失敗／逾時 → 退回 Nominatim */ }
  // 2) 退回 Nominatim
  if (!res) {
    try {
      const n = await (await fetchTimeout(
        `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(eq)}`,
        { headers: { 'Accept-Language': 'zh-TW' } }
      )).json();
      lastGeoDelay = 1100;
      if (n.length) res = { lat: +n[0].lat, lon: +n[0].lon };
    } catch (e) { lastGeoDelay = 1100; }
  }
  geoCache[q] = res;
  saveGeo();
  return geoCache[q];
}

/* 迴圈批次定位用：查完自動依「實際用到的服務」禮貌等待（快取/座標/Plus Code 不等） */
async function geocodeSlow(q) {
  if (geoCache[q] !== undefined) return geoCache[q];
  const r = await geocode(q);
  if (lastGeoDelay) await sleep(lastGeoDelay);
  return r;
}

/* 加逾時的 fetch，避免某個免費服務卡住整個查詢流程 */
function fetchTimeout(url, opts, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms || 6000);
  return fetch(url, Object.assign({ signal: ctrl.signal }, opts || {})).finally(() => clearTimeout(t));
}

function haversineKm(p1, p2) {
  const R = 6371, toR = x => x * Math.PI / 180;
  const dLat = toR(p2.lat - p1.lat), dLon = toR(p2.lon - p1.lon);
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(toR(p1.lat)) * Math.cos(toR(p2.lat)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

let routing = false;
async function estimateRoute(di) {
  if (routing) return toast('查詢中，請稍候…');
  const trip = getTrip(view.tripId);
  const acts = trip.days[di].acts;
  seedActCoords(acts);
  const stops = acts.filter(a => a.loc);
  if (stops.length < 2) {
    return toast('請先在至少 2 個活動填「地點」，才能估算之間的車程');
  }
  routing = true;
  toast('⏱️ 正在查詢地點與路線，請稍候…');
  try {
    const missing = [];
    for (const a of stops) {
      if (geoCache[a.loc] === undefined) await geocodeSlow(a.loc);   // 依實際服務自動禮貌限速
      if (!geoCache[a.loc]) missing.push(a.loc);
    }
    acts.forEach(a => delete a.travel);
    // 查不到座標的點直接跳過，串接前後找得到的地點
    const located = stops.filter(a => geoCache[a.loc]);
    let okCount = 0;
    for (let k = 1; k < located.length; k++) {
      const p1 = geoCache[located[k - 1].loc], p2 = geoCache[located[k].loc];
      let mins, km, est = false;
      try {
        const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${p1.lon},${p1.lat};${p2.lon},${p2.lat}?overview=false`);
        const j = await r.json();
        if (j.code === 'Ok' && j.routes && j.routes[0]) {
          mins = Math.max(1, Math.round(j.routes[0].duration / 60));
          km = +(j.routes[0].distance / 1000).toFixed(1);
        }
      } catch (e) { /* OSRM 失敗 → 退回直線估算 */ }
      if (mins === undefined) {
        const d = haversineKm(p1, p2) * 1.3; // 直線距離 ×1.3 近似實際路程
        km = +d.toFixed(1);
        mins = Math.max(1, Math.round(d / 40 * 60)); // 以市區均速 40km/h 估
        est = true;
      }
      // travel 掛在「後一個」活動上：代表從上一站過來的車程
      const idx = acts.indexOf(located[k]);
      acts[idx].travel = { mins, km, est };
      okCount++;
    }
    save();
    if (isShared(trip)) acts.forEach(a => { a.di = di; rAct(trip, a); });   // 車程同步到雲端，避免同步後消失
    render();
    if (okCount) {
      toast(`完成！已估出 ${okCount} 段車程${missing.length ? `（查不到：${missing.join('、')}）` : ''}`);
    } else {
      toast(`查不到地點${missing.length ? `（${missing.join('、')}）` : ''}，建議寫地標或地址（例如「淺草寺 東京」）`);
    }
  } catch (e) {
    toast('⚠️ 網路查詢失敗，請確認連線後再試');
  } finally {
    routing = false;
  }
}

/* ===================== 即時共編（Firebase Realtime Database） ===================== */
let db = null, activeRoomRef = null, activeRoomId = null;
let pendingSnap = null, applyTimer = null;  // 合併同步回呼，避免中途覆蓋本機正在進行的編輯
let myName = localStorage.getItem('tripPlanner.me') || '';

/* URL-safe base64：避免 +/= 在網址裡被改掉 */
function b64encode(obj) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj))))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function b64decode(s) {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  return JSON.parse(decodeURIComponent(escape(atob(s))));
}

function getFbConfig() {
  try { const r = localStorage.getItem('tripPlanner.fb'); return r ? JSON.parse(r) : null; }
  catch (e) { return null; }
}
function initFirebase(cfg) {

  try {

    db = firebase.database();
    localStorage.setItem('tripPlanner.fb', JSON.stringify(cfg));
    return true;
  } catch (e) { toast('Firebase 設定有誤：' + e.message); return false; }
}
function fbReady() { return !!db; }
function isShared(trip) { return !!(trip && trip.roomId && db); }

function ensureName() {

/* 本機 ↔ 遠端 結構轉換 */
function actToRemote(a) {
  return {
    di: a.di | 0, order: a.order || 0, title: a.title || '', cat: a.cat || 'other',
    time: a.time || '', end: a.endTime || '', cost: Number(a.cost) || 0, loc: a.loc || '',
    link: a.link || '', note: a.note || '',
    by: a.by || '', tmins: a.travel ? a.travel.mins : null, tkm: a.travel ? a.travel.km : null,
    test: a.travel ? !!a.travel.est : null, fk: a.flightKey || null,
    alat: a.lat != null ? a.lat : null, alon: a.lon != null ? a.lon : null
  };
}
function infoToRemote(trip) {
  return {
    name: trip.name, start: trip.start, end: trip.end, budget: trip.budget || 0,
    currency: trip.currency || 'NT$', rate: trip.rate || 0, region: trip.region || '', flights: trip.flights || null,
    people: trip.people || [], updatedAt: Date.now()
  };
}
function expToRemote(e) {
  return { title: e.title || '', amount: Number(e.amount) || 0, payer: e.payer || '',
    sharedBy: e.sharedBy || [], date: e.date || '', by: e.by || '' };
}

function uploadTrip(trip) {
  if (!isShared(trip)) return;
  const acts = {};
  trip.days.forEach((d, di) => d.acts.forEach(a => {
    if (!a.id) a.id = uid();
    a.di = di;
    acts[a.id] = actToRemote(a);
  }));
  const expenses = {};
  (trip.expenses || []).forEach(e => { if (!e.id) e.id = uid(); expenses[e.id] = expToRemote(e); });
  db.ref('rooms/' + trip.roomId).set({ info: infoToRemote(trip), acts, expenses });
}
function rInfo(trip) { if (isShared(trip)) db.ref('rooms/' + trip.roomId + '/info').set(infoToRemote(trip)); }
function rAct(trip, a) {
  if (!isShared(trip)) return;
  if (!a.id) a.id = uid();
  db.ref('rooms/' + trip.roomId + '/acts/' + a.id).set(actToRemote(a));
}
function rDelAct(trip, id) { if (isShared(trip) && id) db.ref('rooms/' + trip.roomId + '/acts/' + id).remove(); }
function rExpense(trip, e) { if (isShared(trip)) { if (!e.id) e.id = uid(); db.ref('rooms/' + trip.roomId + '/expenses/' + e.id).set(expToRemote(e)); } }
function rDelExpense(trip, id) { if (isShared(trip) && id) db.ref('rooms/' + trip.roomId + '/expenses/' + id).remove(); }

/* 遠端快照 → 套用到本機（重建該行程） */
function applyRemote(roomId, val) {
  if (!roomId || !val) return;   // 退訂後殘留的排程快照不套用，避免生出幽靈行程
  const info = val.info || {};
  let trip = state.trips.find(t => t.roomId === roomId);
  const today = new Date().toISOString().slice(0, 10);
  if (!trip) {
    trip = { id: uid(), roomId, name: info.name || '共享行程', start: info.start || today, end: info.end || today,
      budget: 0, currency: 'NT$', rate: 0, days: [] };
    state.trips.push(trip);
  }
  if (info.start) trip.start = info.start;
  if (info.end) trip.end = info.end;
  trip.name = info.name || trip.name;
  trip.budget = info.budget || 0; trip.currency = info.currency || 'NT$'; trip.rate = info.rate || 0;
  trip.region = info.region || trip.region || '';
  trip.flights = info.flights || undefined;
  trip.people = info.people || trip.people || [];
  trip.expenses = Object.keys(val.expenses || {}).map(id => {
    const e = val.expenses[id];
    return { id, title: e.title || '', amount: e.amount || 0, payer: e.payer || '',
      sharedBy: e.sharedBy || [], date: e.date || '', by: e.by || '' };
  });
  syncDays(trip);
  trip.days.forEach(d => d.acts = []);
  const acts = val.acts || {};
  Object.keys(acts).forEach(id => {
    const a = acts[id];
    const di = Math.min(Math.max(0, a.di | 0), trip.days.length - 1);
    const act = { id, di, order: a.order || 0, title: a.title || '', cat: a.cat || 'other',
      time: a.time || '', endTime: a.end || '', cost: a.cost || 0, loc: a.loc || '',
      link: a.link || '', note: a.note || '', by: a.by || '' };
    if (a.tmins != null) act.travel = { mins: a.tmins, km: a.tkm, est: !!a.test };
    if (a.fk) act.flightKey = a.fk;
    if (a.alat != null) { act.lat = a.alat; act.lon = a.alon; }
    trip.days[di].acts.push(act);
  });
  trip.days.forEach(sortDay);
  save();
  // 有人正在打字（modal 開著）就先不重畫，避免打斷輸入
  if (!document.querySelector('.modal-mask') && (view.tripId === trip.id || view.page === 'list')) render();
}

function unsubscribeRoom() {
  if (activeRoomRef) activeRoomRef.off();
  activeRoomRef = null; activeRoomId = null;
  if (applyTimer) { clearTimeout(applyTimer); applyTimer = null; }
  pendingSnap = null;
}

function subscribeRoom(trip) {
  if (!isShared(trip)) return;
  if (activeRoomRef && activeRoomId === trip.roomId) return;
  unsubscribeRoom();
  activeRoomId = trip.roomId;
  activeRoomRef = db.ref('rooms/' + trip.roomId);
  // 同步回呼可能在我們自己的多筆寫入過程中「同步」連續觸發；
  // 先暫存最新快照、延後一拍合併套用，確保整批寫完（含航班）才以最終狀態更新，不會中途覆蓋編輯。
  activeRoomRef.on('value', snap => {
    pendingSnap = snap.val();
    if (applyTimer) return;
    applyTimer = setTimeout(() => {
      applyTimer = null;
      const v = pendingSnap; pendingSnap = null;
      applyRemote(activeRoomId, v);
    }, 0);
  });
}

  trip.days.forEach((d, di) => d.acts.forEach(a => { if (!a.id) a.id = uid(); if (!a.by) a.by = myName; a.di = di; }));

}

function computeBalances(trip) {
  const people = trip.people || [];
  const paid = {}, owed = {};
  people.forEach(p => { paid[p] = 0; owed[p] = 0; });
  (trip.expenses || []).forEach(e => {
    const amt = Number(e.amount) || 0;
    paid[e.payer] = (paid[e.payer] || 0) + amt;
    const sh = (e.sharedBy && e.sharedBy.length) ? e.sharedBy : people;
    if (!sh.length) return;
    const per = amt / sh.length;
    sh.forEach(p => { owed[p] = (owed[p] || 0) + per; });
  });
  const names = Array.from(new Set([...people, ...Object.keys(paid), ...Object.keys(owed)])).filter(Boolean);
  const net = {};
  names.forEach(p => net[p] = (paid[p] || 0) - (owed[p] || 0));
  return { names, paid, owed, net };
}
function settleUp(net) {
  const cred = [], deb = [];
  Object.keys(net).forEach(p => { const v = Math.round(net[p]); if (v > 0) cred.push({ p, v }); else if (v < 0) deb.push({ p, v: -v }); });
  cred.sort((a, b) => b.v - a.v); deb.sort((a, b) => b.v - a.v);
  const out = []; let i = 0, j = 0;
  while (i < deb.length && j < cred.length) {
    const pay = Math.min(deb[i].v, cred[j].v);
    if (pay > 0) out.push({ from: deb[i].p, to: cred[j].p, amt: pay });
    deb[i].v -= pay; cred[j].v -= pay;
    if (deb[i].v <= 0) i++;
    if (cred[j].v <= 0) j++;
  }
  return out;
}

  const trip = getTrip(tripId);
  const inp = document.getElementById('personName');
  const name = inp.value.trim();
  if (!name) return;
  if (!trip.people) trip.people = [];
  if (trip.people.includes(name)) { inp.value = ''; return toast('這個名字已經有了'); }
  trip.people.push(name);
  save(); rInfo(trip); render();
}
function removePerson(tripId, name) {
  const trip = getTrip(tripId);
  const used = (trip.expenses || []).some(e => e.payer === name || (e.sharedBy || []).includes(name));
  if (used && !confirm(`「${name}」已被某些支出使用。移除不會刪那些支出，但分帳會變動。確定移除？`)) return;
  trip.people = (trip.people || []).filter(p => p !== name);
  save(); rInfo(trip); render();
}

function saveExpense(tripId, eid) {
  const trip = getTrip(tripId);
  const title = document.getElementById('expTitle').value.trim();
  const amount = Number(document.getElementById('expAmount').value) || 0;
  if (!title) return toast('請輸入項目名稱');
  if (amount <= 0) return toast('請輸入金額');
  const payer = document.getElementById('expPayer').value;
  const sharedBy = [...document.querySelectorAll('#expShared input:checked')].map(c => c.value);
  if (!sharedBy.length) return toast('請至少勾選一個分攤的人');
  const prev = eid ? (trip.expenses || []).find(x => x.id === eid) : null;
  const exp = { id: prev ? prev.id : uid(), title, amount, payer, sharedBy,
    date: document.getElementById('expDate').value, by: prev ? (prev.by || myName) : myName };
  if (!trip.expenses) trip.expenses = [];
  if (prev) { const i = trip.expenses.findIndex(x => x.id === eid); trip.expenses[i] = exp; }
  else trip.expenses.push(exp);
  save(); rExpense(trip, exp); closeModal(); render();
}
function delExpense(tripId, eid) {
  const trip = getTrip(tripId);
  const exp = (trip.expenses || []).find(x => x.id === eid);
  if (!exp || !confirm(`刪除支出「${exp.title}」？`)) return;
  trip.expenses = trip.expenses.filter(x => x.id !== eid);
  save(); rDelExpense(trip, eid); render();
}

/* 先讓使用者選起點與是否來回，再計算 */

    <div class="field">
      <label>從哪裡出發（起點）</label>
      <select id="optStart">${opts}</select>
    </div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="optLoop" style="width:auto"> 最後回到起點（來回路線，例如住宿出發再回住宿）
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="(function(){const s=document.getElementById('optStart').value,l=document.getElementById('optLoop').checked;closeModal();optimizeDay(${di},s,l);})()">開始計算</button>
    </div>
  `);
}

let optimizing = false;
async function optimizeDay(di, startId, loop) {
  if (optimizing) return toast('計算中，請稍候…');
  if (routing) return toast('路線查詢中，請稍候…');
  const trip = getTrip(view.tripId);
  const acts = trip.days[di].acts;
  seedActCoords(acts);
  const located = acts.filter(a => a.loc && !a.flightKey);  // 航班活動不參與重排，維持原位
  if (located.length < 3) return toast('請先在至少 3 個活動填「地點」，才需要排最短路徑');

  optimizing = true;
  toast('🧭 正在計算最短路徑…');
  try {
    const missing = [];
    for (const a of located) {
      if (geoCache[a.loc] === undefined) await geocodeSlow(a.loc);
      if (!geoCache[a.loc]) missing.push(a.loc);
    }
    const pts = located.filter(a => geoCache[a.loc]);
    if (pts.length < 3) { optimizing = false; return toast('可定位的地點不足 3 個' + (missing.length ? `（查不到：${missing.join('、')}）` : '')); }

    const coords = pts.map(a => `${geoCache[a.loc].lon},${geoCache[a.loc].lat}`).join(';');
    let dur = null, dist = null, usedFallback = false;
    try {
      const r = await fetch(`https://router.project-osrm.org/table/v1/driving/${coords}?annotations=duration,distance`);
      const j = await r.json();
      if (j.code === 'Ok') { dur = j.durations; dist = j.distances; }
    } catch (e) { /* 退回直線估算 */ }
    const n = pts.length;
    if (!dur) {
      usedFallback = true;
      dur = []; dist = [];
      for (let i = 0; i < n; i++) {
        dur[i] = []; dist[i] = [];
        for (let j = 0; j < n; j++) {
          const km = haversineKm(geoCache[pts[i].loc], geoCache[pts[j].loc]) * 1.3;
          dist[i][j] = km * 1000; dur[i][j] = km / 40 * 3600;
        }
      }
    }

    let startIdx = 0;
    if (startId) { const si = pts.findIndex(a => a.id === startId); if (si >= 0) startIdx = si; }
    const order = solveTSP(dur, startIdx, !!loop);   // 起點可選，loop=來回
    const optimized = order.map(i => pts[i]);
    const rest = acts.filter(a => !pts.includes(a));
    let totMin = 0, totKm = 0;
    optimized.forEach((a, k) => {
      delete a.travel;
      if (k > 0) {
        const i = order[k - 1], j = order[k];
        const mins = Math.max(1, Math.round(dur[i][j] / 60)), km = +(dist[i][j] / 1000).toFixed(1);
        a.travel = { mins, km, est: usedFallback };
        totMin += mins; totKm += dist[i][j] / 1000;
      }
      a.time = '';
      a.order = k;
    });
    rest.forEach((a, k) => { a.order = optimized.length + k; });
    trip.days[di].acts = [...optimized, ...rest];
    trip.days[di].acts.forEach(a => { a.di = di; });   // 確保「第幾天」正確
    sortDay(trip.days[di]);   // 有時間的（如航班）浮回時間位置，無時間的維持最佳順序
    trip.days[di]._opt = { stops: optimized.length, mins: totMin, km: +totKm.toFixed(1), est: usedFallback };
    save();
    if (isShared(trip)) trip.days[di].acts.forEach(a => rAct(trip, a));
    render();
    const hh = Math.floor(totMin / 60);
    toast(`最短路徑完成！${optimized.length} 個點 · 總車程約 ${hh ? hh + 'h ' : ''}${totMin % 60}m / ${totKm.toFixed(1)} km${missing.length ? `（查不到：${missing.join('、')}）` : ''}`);
  } catch (e) {
    toast('⚠️ 計算失敗，請確認網路後再試');
  } finally {
    optimizing = false;
  }
}

/* 最近鄰 + 2-opt（m＝時間矩陣秒數；開放路徑、固定起點 start） */
function solveTSP(m, start, loop) {
  const n = m.length;
  if (n <= 2) return Array.from({ length: n }, (_, i) => i);
  const visited = new Array(n).fill(false);
  let route = [start]; visited[start] = true;
  for (let k = 1; k < n; k++) {
    const last = route[route.length - 1];
    let best = -1, bd = Infinity;
    for (let j = 0; j < n; j++) if (!visited[j] && m[last][j] < bd) { bd = m[last][j]; best = j; }
    route.push(best); visited[best] = true;
  }
  const cost = r => {
    let c = 0;
    for (let i = 0; i < r.length - 1; i++) c += m[r[i]][r[i + 1]];
    if (loop) c += m[r[r.length - 1]][r[0]];
    return c;
  };
  let improved = true;
  while (improved) {
    improved = false;
    for (let i = 1; i < n - 1; i++) {
      for (let j = i + 1; j < n; j++) {
        const nr = route.slice(0, i).concat(route.slice(i, j + 1).reverse(), route.slice(j + 1));
        if (cost(nr) < cost(route) - 1e-6) { route = nr; improved = true; }
      }
    }
  }
  return route;
}
